apiVersion: v1
kind: Namespace
metadata:
  name: paprika-e2e
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-vke-deployer
  namespace: paprika-e2e
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-vke-deployer
  namespace: paprika-e2e
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - persistentvolumeclaims
      - pods
      - pods/log
      - pods/portforward
      - secrets
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
    verbs: ["bind", "escalate"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - rolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - issuers
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - httproutes
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheusrules
      - servicemonitors
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-vke-deployer
  namespace: paprika-e2e
subjects:
  - kind: ServiceAccount
    name: github-actions-vke-deployer
    namespace: paprika-e2e
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: repo:paprikacd/paprika:environment:vke-production
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: https://token.actions.githubusercontent.com#repo:paprikacd/paprika:environment:vke-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-actions-vke-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-actions-vke-deployer
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
    verbs: ["bind", "escalate"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterrolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-actions-vke-deployer
subjects:
  - kind: ServiceAccount
    name: github-actions-vke-deployer
    namespace: paprika-e2e
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: repo:paprikacd/paprika:environment:vke-production
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: https://token.actions.githubusercontent.com#repo:paprikacd/paprika:environment:vke-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: github-actions-vke-deployer
