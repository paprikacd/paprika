---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: appprojects.core.paprika.io
spec:
  group: core.paprika.io
  names:
    kind: AppProject
    listKind: AppProjectList
    plural: appprojects
    singular: appproject
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AppProject groups applications into a multi-tenant project with
          source, destination, and resource constraints.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AppProjectSpec defines tenant boundaries and resource constraints
              for applications.
            properties:
              clusterResourceBlacklist:
                description: ClusterResourceBlacklist denies cluster-scoped resources.
                items:
                  type: string
                type: array
              clusterResourceWhitelist:
                description: ClusterResourceWhitelist permits cluster-scoped resources.
                items:
                  type: string
                type: array
              description:
                type: string
              destinations:
                description: Destinations restricts target cluster/server and namespace
                  combinations.
                items:
                  description: AppProjectDestination restricts where applications
                    may deploy.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    server:
                      type: string
                  type: object
                type: array
              kinds:
                description: Kinds restricts which Kubernetes kinds may be deployed.
                  Empty means all.
                items:
                  type: string
                type: array
              kindsDeny:
                description: KindsDeny denies matching kinds.
                items:
                  type: string
                type: array
              limits:
                description: Limits constrain resource usage within this project.
                  Zero/unset means unlimited.
                properties:
                  maxApplications:
                    description: MaxApplications is the maximum number of Applications
                      in this project. Zero = unlimited.
                    type: integer
                  maxReleases:
                    description: MaxReleases is the maximum number of Releases (across
                      all Applications in the project). Zero = unlimited.
                    type: integer
                type: object
              repositories:
                description: |-
                  Repositories restricts which core.paprika.io Repository names are allowed.
                  Applications/Templates referencing a Repository must use one of these names.
                items:
                  type: string
                type: array
              roles:
                description: Roles define project-level RBAC subjects.
                items:
                  description: AppProjectRole defines project-level access.
                  properties:
                    actions:
                      items:
                        type: string
                      type: array
                    name:
                      type: string
                    subjects:
                      items:
                        type: string
                      type: array
                  required:
                  - name
                  type: object
                type: array
              sourceRepos:
                description: SourceRepos restricts which repository URLs are allowed.
                  Empty means all.
                items:
                  type: string
                type: array
              sourceReposDeny:
                description: SourceReposDeny denies matching repository URLs.
                items:
                  type: string
                type: array
            type: object
          status:
            description: AppProjectStatus defines the observed state of AppProject.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
