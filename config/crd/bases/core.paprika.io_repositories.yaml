---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: repositories.core.paprika.io
spec:
  group: core.paprika.io
  names:
    kind: Repository
    listKind: RepositoryList
    plural: repositories
    singular: repository
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .status.connectionState.status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Repository is a named, reusable configuration for an external source (git, helm, or OCI).
          Applications and Templates can reference a Repository by name instead of inlining URLs
          and credentials, and AppProjects can constrain which Repositories are allowed.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RepositorySpec defines the specification for a Repository.
            properties:
              enableLfs:
                description: EnableLFS enables Git Large File Storage fetch (git type).
                type: boolean
              forceHttpBasicAuth:
                description: ForceHTTPBasicAuth forces HTTP basic auth even if credentials
                  look like a token.
                type: boolean
              githubApp:
                description: GitHubApp credentials (git type only).
                properties:
                  appId:
                    description: AppID is the GitHub App ID.
                    type: string
                  enterpriseUrl:
                    description: EnterpriseURL is the base URL for GitHub Enterprise
                      (e.g. https://github.example.com).
                    type: string
                  installationId:
                    description: InstallationID is the GitHub App installation ID.
                    type: string
                type: object
              insecure:
                description: Insecure allows plain HTTP/registry (no TLS) for oci
                  and helm types.
                type: boolean
              noProxy:
                description: NoProxy disables proxy usage for this repository.
                type: boolean
              secretRef:
                description: SecretRef references credentials for the repository.
                properties:
                  name:
                    description: Name of the Secret in the same namespace.
                    type: string
                required:
                - name
                type: object
              type:
                description: 'Type of repository: git, helm, or oci.'
                enum:
                - git
                - helm
                - oci
                type: string
              url:
                description: |-
                  URL of the repository. Examples:
                    git:  https://github.com/org/repo, git@github.com:org/repo.git
                    helm: https://charts.example.com
                    oci:  oci://registry.example.com/charts
                type: string
            required:
            - type
            - url
            type: object
          status:
            description: RepositoryStatus defines the observed state of Repository.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              connectionState:
                description: ConnectionState describes the result of the most recent
                  connection attempt.
                properties:
                  attemptedAt:
                    format: date-time
                    type: string
                  message:
                    type: string
                  responseTime:
                    type: string
                  revision:
                    type: string
                  status:
                    description: ConnectionStatus represents the health of a Repository's
                      last connection attempt.
                    type: string
                type: object
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        - status
        type: object
    served: true
    storage: true
    subresources:
      status: {}
