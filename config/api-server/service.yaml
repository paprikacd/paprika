apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: system
  labels:
    app.kubernetes.io/component: api-server
    app.kubernetes.io/name: paprika
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: api-server
    app.kubernetes.io/name: paprika
  ports:
  - name: api
    port: 3000
    targetPort: 3000
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
