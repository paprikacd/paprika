apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - --health-probe-bind-address=:8081
        - --controllers-only
        env:
        - name: PAPRIKA_CACHE_BACKEND
          value: "memory"
        - name: ENABLE_WEBHOOKS
          value: "false"
