apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: paprika-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "5"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containers:
        - image: ghcr.io/paprikacd/paprika:latest
          args:
            - --mode=api
          ports:
            - containerPort: 3000
              name: http
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 30
      serviceAccountName: paprika-cloudrun
