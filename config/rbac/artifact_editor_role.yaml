# This rule is not used by the project paprika itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the pipelines.paprika.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: paprika
    app.kubernetes.io/managed-by: kustomize
  name: artifact-editor-role
rules:
- apiGroups:
  - pipelines.paprika.io
  resources:
  - artifacts
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pipelines.paprika.io
  resources:
  - artifacts/status
  verbs:
  - get
