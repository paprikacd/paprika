apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  namespace: system
  labels:
    app.kubernetes.io/component: webhook-receiver
    app.kubernetes.io/name: paprika
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: webhook-receiver
    app.kubernetes.io/name: paprika
  ports:
  - name: webhook
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: health
    port: 8081
    targetPort: 8081
    protocol: TCP
