<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paprika</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #181b21;
      --text: #e4e6eb;
      --muted: #8b95a8;
      --accent: #ff6b35;
      --border: #2a2f38;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    .container {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 65px);
    }
    nav {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1rem;
    }
    nav a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.25rem;
    }
    nav a:hover, nav a.active { color: var(--text); background: #242930; }
    main { padding: 2rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .events {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      max-height: 300px;
      overflow-y: auto;
      background: #0b0d10;
      border-radius: 6px;
      padding: 0.75rem;
    }
    .event { margin-bottom: 0.5rem; color: var(--muted); }
    .event b { color: var(--accent); }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    #status { color: var(--muted); font-size: 0.875rem; }
  </style>
</head>
<body>
  <header>
    <h1>Paprika</h1>
    <div id="status">Connecting...</div>
  </header>
  <div class="container">
    <nav>
      <a href="#" class="active">Applications</a>
      <a href="#">Pipelines</a>
      <a href="#">Releases</a>
      <a href="#">Stages</a>
      <a href="#">Settings</a>
    </nav>
    <main>
      <div class="card">
        <h2>Live Events</h2>
        <div class="events" id="events"></div>
      </div>
      <div class="card">
        <h2>Actions</h2>
        <button onclick="triggerSync()">Trigger Sync</button>
      </div>
    </main>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const eventsEl = document.getElementById('events');

    function connect() {
      const source = new EventSource('/events?topic=apps');
      source.onopen = () => { statusEl.textContent = 'Connected'; };
      source.onerror = () => { statusEl.textContent = 'Disconnected'; };
      source.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const div = document.createElement('div');
        div.className = 'event';
        div.innerHTML = `<b>${data.type}</b> ${new Date(data.timestamp).toLocaleTimeString()} <pre>${JSON.stringify(data.payload, null, 2)}</pre>`;
        eventsEl.prepend(div);
      };
    }

    function triggerSync() {
      fetch('/paprika.v1.PaprikaService/SyncApplication', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'example', namespace: 'default' })
      }).catch(() => {});
    }

    connect();
  </script>
</body>
</html>
