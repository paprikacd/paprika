# Global settings
replicaCount: 2
canaryWeight: 0

image:
  repository: nginxinc/nginx-unprivileged
  tag: alpine
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

gitops:
  marker: gitops-roundtrip-1

probes:
  enabled: true
  readinessPath: /
  livenessPath: /
  startupPath: /
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 6

# Feature flags toggled per release/stage
features:
  canary:
    enabled: false
    weight: 10
  monitoring:
    enabled: false
    sidecarImage: "prom/node-exporter:v1.7.0"
  ingress:
    enabled: false
    host: demo-app.example.com
  metrics:
    enabled: false
    path: /metrics
