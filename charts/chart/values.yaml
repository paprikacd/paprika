## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## NetworkPolicy configuration.
##
networkPolicy:
  enabled: false

## Webhook configuration.
##
webhook:
  enabled: true
  port: 9443

## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Arguments (added in both operator and api modes)
  ##
  args:
    - --ui-bind-address=:3000

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

  ## Extra volumes and volume mounts
  ##
  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  # -- Enable controller sharding. When true, manager is deployed as a StatefulSet
  # with per-pod PAPRIKA_SHARD_ID/PAPRIKA_SHARD_TOTAL env vars.
  sharding:
    enabled: false
    replicas: 3
    serviceName: controller-manager-headless

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

# -- Deployment architecture: "monolith" (single pod with everything)
# or "split" (separate controller-manager, api-server, webhook-receiver pods)
deploymentMode: monolith

# -- Deployment mode for the manager container: "operator" (controllers + API + webhook)
# In split mode this is automatically set to "operator" for the controller-manager pod.
# In monolith mode this controls the single pod behavior.
mode: operator

## API server configuration (used only when deploymentMode=split)
##
apiServer:
  enabled: true
  replicas: 2

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  args:
    - --ui-bind-address=:3000

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 1000m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 3000

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

## Webhook receiver configuration (used only when deploymentMode=split)
##
webhookReceiver:
  enabled: true
  replicas: 2

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 8080

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

  secret:
    # -- Name of an existing secret containing the webhook secret key
    existingSecretName: ""
    # -- Key inside the secret that holds the webhook secret
    existingSecretKey: "secret"

# Remote cluster connection (api mode only)
remoteCluster:
  # -- Kubernetes API server URL (e.g., https://1.2.3.4:443)
  apiServer: ""
  # -- Path to mounted service account token file
  tokenFile: ""

## Repo server caches git/S3 sources and renders manifests.
##
repoServer:
  enabled: false
  replicas: 2

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  args:
    - --mode=repo-server
    - --ui-bind-address=:8082
    - --health-probe-bind-address=:8081

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 8082

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

## In-cluster agent for remote cluster deployments.
## The agent runs as a DaemonSet and applies manifests sent by the controller.
##
agent:
  enabled: false

  tls:
    enabled: false
    certSecret: ""
    caSecret: ""

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  args:
    - --mode=agent
    - --ui-bind-address=:8083
    - --health-probe-bind-address=:8081

  clusterID: ""

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 8083

  nodeSelector: {}

  tolerations: []

  affinity: {}

  vpa:
    enabled: false
    mode: "Off"

## API server authentication and authorization
##
auth:
  # -- Enable authentication and authorization for the API server
  enabled: false

  # -- Allow unauthenticated requests when no credentials are provided
  allowUnauthenticated: false

  ## HTTP Basic authentication
  ##
  basic:
    enabled: false
    username: ""
    # -- Plain-text password (not recommended for production)
    password: ""
    # -- SHA-256 hash of the password, hex-encoded
    passwordHash: ""

  ## OpenID Connect authentication
  ##
  oidc:
    enabled: false
    issuerURL: ""
    clientID: ""
    clientSecret: ""

  ## RBAC authorization rules
  ## Subjects may be user names or "group:<group-name>".
  ## Actions: read, write, admin (or * for all).
  ## Resources: applications, pipelines, releases, stages, templates, artifacts (or *).
  ## Namespaces: specific namespace or * for all.
  ##
  rbac: []
  # - subjects: ["admin"]
  #   actions: ["*"]
  #   resources: ["*"]
  #   namespaces: ["*"]
  # - subjects: ["group:readers"]
  #   actions: ["read"]
  #   resources: ["applications"]
  #   namespaces: ["default"]

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enable: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enable: true

  ## Existing ServiceAccount name (only when enable=false)
  ## Note: When enable=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enable: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

  rules:
    enabled: false

grafana:
  dashboards:
    enabled: false
    ## Labels used by Grafana sidecar to discover dashboards.
    ##
    labelSelectors:
      grafana_dashboard: "1"

## Redis cache configuration.
## When enabled, components use Redis for rendered manifest and source caching.
##
redis:
  enabled: false
  addr: "redis:6379"
  password: ""
  db: 0

## Audit logging. When enabled, the API server records structured JSON audit
## events for mutating operations to stdout.
audit:
  enabled: true

## Disaster recovery via Velero. When enabled, renders a Velero Schedule that backs up the
## Paprika control-plane state (CRDs in the release namespace) on a cron schedule.
## Velero must already be installed in the cluster (https://velero.io/docs/) with a
## BackupStorageLocation; the Schedule is created in the Velero namespace.
##
velero:
  enabled: false
  ## Namespace where Velero is installed. Schedules must live here for Velero to reconcile them.
  namespace: velero
  ## Name of an existing Velero BackupStorageLocation to send backups to.
  storageLocation: default
  ## Cron schedule for backups. Default: every 6 hours.
  schedule: "0 */6 * * *"
  ## How long Velero retains each backup. Default: 30 days.
  ttl: "720h"
  ## Extra namespaces to include in the backup (e.g. namespaces where your Applications live).
  ## The Paprika release namespace is always included, and cluster-scoped CRDs are backed up
  ## so the custom resource definitions are restored before their instances.
  includeNamespaces: []

