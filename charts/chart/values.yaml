## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Common labels added to all resources. Useful for cost-centre, environment, team, etc.
##
# commonLabels:
#   environment: production
#   team: platform

## Number of old ReplicaSets to retain. Defaults to 10 if unset.
##
# revisionHistoryLimit: 5

## Pod priority class name for all components. Override per-component below.
##
# priorityClassName: production-high

## NetworkPolicy configuration.
##
networkPolicy:
  enabled: false

## Webhook configuration.
##
webhook:
  # Enable Kubernetes admission webhooks. This requires serving certificates,
  # normally by setting certManager.enable=true in clusters with cert-manager.
  enabled: false
  port: 8080
  # Admission failure policy for Paprika webhooks. Use Ignore on managed
  # control planes that cannot reliably reach in-cluster webhook services.
  failurePolicy: Fail
  timeoutSeconds: 10
  service:
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    annotations: {}

## Configure the controller manager deployment
##
manager:
  ## Set to false to skip manager installation
  ##
  enabled: true

  replicas: 1

  ## The controller-manager needs in-cluster credentials to watch and
  ## reconcile Paprika resources. Keep this enabled unless you provide
  ## credentials through another mechanism.
  ##
  automountServiceAccountToken: true

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Arguments (added in both operator and api modes)
  ##
  args:
    - --ui-bind-address=:3000

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests. The controller-manager runs ~15 informers
  ## (CRDs + core Pods/ReplicaSets) so it needs at least 512Mi memory and a
  ## generous CPU share. On large or slow clusters raise memory to 1Gi.
  ##
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

  ## Deployment strategy
  ##
  # strategy:
  #   type: RollingUpdate
  #   rollingUpdate:
  #     maxSurge: 25%
  #     maxUnavailable: 25%

  ## Priority class name (overrides global .priorityClassName)
  ##
  # priorityClassName: ""

  ## Topology spread constraints
  ##
  # topologySpreadConstraints: []

  ## Service configuration (used for monolith / api-mode API service)
  ##
  service:
    type: ClusterIP
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  ## Termination grace period seconds
  ##
  terminationGracePeriodSeconds: 10

  ## Custom Deployment labels
  ##
  # labels: {}

  ## Custom Deployment annotations
  ##
  # annotations: {}

  ## Custom Pod labels and annotations
  ##
  # pod:
  #   labels: {}
  #   annotations: {}

  ## Extra environment variables (value literals)
  ##
  # extraEnv:
  #   - name: MY_VAR
  #     value: my-value

  ## Extra environment variables (from ConfigMap/Secret refs)
  ##
  # extraEnvFrom:
  #   - configMapRef:
  #       name: my-config
  #   - secretRef:
  #       name: my-secret

  ## Extra volumes and volume mounts
  ##
  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  # -- Enable controller sharding. When true, manager is deployed as a StatefulSet
  # with per-pod PAPRIKA_SHARD_ID/PAPRIKA_SHARD_TOTAL env vars.
  sharding:
    enabled: false
    replicas: 3
    serviceName: controller-manager-headless

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

## Namespace configuration. Use with caution — the namespace is kept on uninstall
## to avoid data loss. Set Pod Security Admission labels via .labels.
##
namespace:
  create: false
  labels:
    # pod-security.kubernetes.io/enforce: restricted
    # pod-security.kubernetes.io/audit: restricted
    # pod-security.kubernetes.io/warn: restricted
  annotations: {}

# -- Deployment architecture: "monolith" (single pod with everything)
# or "split" (separate controller-manager, api-server, webhook-receiver pods)
deploymentMode: monolith

# -- Deployment mode for the manager container: "operator" (controllers + API + webhook)
# In split mode this is automatically set to "operator" for the controller-manager pod.
# In monolith mode this controls the single pod behavior.
mode: operator

## API server configuration (used only when deploymentMode=split)
##
apiServer:
  enabled: true
  replicas: 2

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  args:
    - --ui-bind-address=:3000

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 1000m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  extraEnv: []

  extraEnvFrom: []

  # priorityClassName: ""

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Node selector (pins pods to specific node pools)
  ##
  nodeSelector: {}

  ## Pod affinity / anti-affinity (recommended for HA)
  ##
  affinity: {}

  ## Pod tolerations (tolerate spot/preemptible nodes)
  ##
  tolerations: []

  ## Topology spread constraints (spread across zones)
  ##
  # topologySpreadConstraints: []

  ## Termination grace period (seconds). Defaults to 30 if unset.
  ##
  # terminationGracePeriodSeconds: 20

  ## Startup probe configures the kubelet startup check.
  ## Disabled by default — configure if startup takes > 15s.
  # startupProbe:
  #   initialDelaySeconds: 10
  #   periodSeconds: 10
  #   failureThreshold: 6

  service:
    type: ClusterIP
    port: 3000
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  ## Ingress / Gateway API for the API server (external access to UI + API).
  ## Supports two modes:
  ##   "ingress"    - standard networking.k8s.io/v1 Ingress (works with nginx, contour, etc.)
  ##   "gateway-api" - Gateway API HTTPRoute (works with Envoy Gateway, Istio, etc.)
  ##
  ingress:
    enabled: false
    ## Type of ingress resource: "ingress" or "gateway-api"
    ##
    # type: ingress
    # className: nginx
    # hosts:
    #   - host: paprika.example.com
    #     paths:
    #       - path: /
    #         pathType: Prefix
    # tls:
    #   - hosts:
    #       - paprika.example.com
    #     secretName: paprika-tls
    # annotations: {}

    ## Gateway API configuration (used when type is "gateway-api").
    ## The GatewayClass and Gateway are expected to exist already (infra-level resources).
    ## This chart only creates the application-level HTTPRoute.
    ##
    # gateway:
    #   gatewayRef:
    #     name: paprika
    #     namespace: envoy-gateway-system
    #   hostname: paprika.example.com

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

## Webhook receiver configuration (used only when deploymentMode=split)
##
webhookReceiver:
  enabled: true
  replicas: 2

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  ## Configurable args (overrides)
  ##
  # args: []

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  extraEnv: []

  extraEnvFrom: []

  # priorityClassName: ""

  ## Init containers (run before the main container)
  ##
  # initContainers:
  #   - name: init-deps
  #     image: busybox:1.36
  #     command: ['sh', '-c', 'until nc -z redis 6379; do sleep 1; done']

  ## Node selector (pins pods to specific node pools)
  ##
  nodeSelector: {}

  ## Pod affinity / anti-affinity (recommended for HA)
  ##
  affinity: {}

  ## Pod tolerations (tolerate spot/preemptible nodes)
  ##
  tolerations: []

  ## Topology spread constraints (spread across zones)
  ##
  # topologySpreadConstraints: []

  ## Termination grace period (seconds). Defaults to 30 if unset.
  ##
  # terminationGracePeriodSeconds: 20

  ## Startup probe configures the kubelet startup check.
  ## Disabled by default — configure if startup takes > 15s.
  # startupProbe:
  #   initialDelaySeconds: 10
  #   periodSeconds: 10
  #   failureThreshold: 6

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 8080
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  ingress:
    enabled: false
    # -- Ingress type: "gateway-api" or "ingress"
    type: gateway-api
    annotations: {}
    gateway:
      # gatewayRef:
      #   name: paprika
      #   namespace: envoy-gateway-system
      # hostname: paprika.example.com
      path: /webhook
    ingress:
      # className: nginx
      # hostname: paprika.example.com
      path: /webhook
      annotations: {}
      # tls:
      #   - secretName: paprika-webhook-tls
      #     hosts:
      #       - paprika.example.com

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

  secret:
    # -- Name of an existing secret containing the webhook secret key
    existingSecretName: ""
    # -- Key inside the secret that holds the webhook secret
    existingSecretKey: "secret"

# Remote cluster connection (api mode only)
remoteCluster:
  # -- Kubernetes API server URL (e.g., https://1.2.3.4:443)
  apiServer: ""
  # -- Path to mounted service account token file
  tokenFile: ""

## Repo server caches git/S3 sources and renders manifests.
##
repoServer:
  enabled: false
  replicas: 2
  # -- Client timeout used by controllers/webhooks when calling the repo server.
  clientTimeout: 2m

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  args:
    - --mode=repo-server
    - --ui-bind-address=:8082
    - --health-probe-bind-address=:8081

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  extraEnv: []

  extraEnvFrom: []

  # priorityClassName: ""

  ## Init containers (run before the main container)
  ##
  # initContainers:
  #   - name: init-deps
  #     image: busybox:1.36
  #     command: ['sh', '-c', 'until nc -z redis 6379; do sleep 1; done']

  ## Node selector (pins pods to specific node pools)
  ##
  nodeSelector: {}

  ## Pod affinity / anti-affinity (recommended for HA)
  ##
  affinity: {}

  ## Pod tolerations (tolerate spot/preemptible nodes)
  ##
  tolerations: []

  ## Topology spread constraints (spread across zones)
  ##
  # topologySpreadConstraints: []

  ## Termination grace period (seconds). Defaults to 30 if unset.
  ##
  # terminationGracePeriodSeconds: 20

  ## Startup probe configures the kubelet startup check.
  ## Disabled by default — configure if startup takes > 15s.
  # startupProbe:
  #   initialDelaySeconds: 10
  #   periodSeconds: 10
  #   failureThreshold: 6

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 8082
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75

  vpa:
    enabled: false
    mode: "Off"

  pdb:
    enabled: false
    minAvailable: 1

## In-cluster agent for remote cluster deployments.
## The agent runs as a DaemonSet and applies manifests sent by the controller.
##
agent:
  enabled: false

  tls:
    enabled: false
    certSecret: ""
    caSecret: ""

  image:
    repository: controller
    ## Image tag (defaults to Chart.appVersion if not set)
    ##
    # tag: ""
    pullPolicy: IfNotPresent

  ## Image pull secrets
  ##
  # imagePullSecrets:
  #   - name: myregistrykey

  args:
    - --mode=agent
    - --ui-bind-address=:8083
    - --health-probe-bind-address=:8081

  clusterID: ""

  ## Termination grace period (seconds). Defaults to 30 if unset.
  ##
  # terminationGracePeriodSeconds: 20

  ## Startup probe configures the kubelet startup check.
  ## Disabled by default — configure if startup takes > 15s.
  # startupProbe:
  #   initialDelaySeconds: 10
  #   periodSeconds: 10
  #   failureThreshold: 6

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  extraEnv: []

  extraEnvFrom: []

  # priorityClassName: ""

  ## Init containers (run before the main container)
  ##
  # initContainers:
  #   - name: init-deps
  #     image: busybox:1.36
  #     command: ['sh', '-c', 'until nc -z redis 6379; do sleep 1; done']

  extraVolumes:
    - emptyDir: {}
      name: tmp

  extraVolumeMounts:
    - mountPath: /tmp
      name: tmp

  service:
    type: ClusterIP
    port: 3000
    ## Service annotations (e.g., for AWS NLB, service mesh)
    ##
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  nodeSelector: {}

  tolerations: []

  affinity: {}

  topologySpreadConstraints: []

  vpa:
    enabled: false
    mode: "Off"

## API server authentication and authorization
##
auth:
  # -- Enable authentication and authorization for the API server
  enabled: false

  ## HTTP Basic authentication
  ##
  basic:
    enabled: false
    username: ""
    # -- bcrypt hash of the password
    passwordHash: ""

  ## OpenID Connect authentication
  ##
  oidc:
    enabled: false
    issuerURL: ""
    clientID: ""
    clientSecret: ""
    # -- Pull OIDC client secret from a Kubernetes Secret (e.g. managed by external-secrets).
    # If set, takes precedence over .clientSecret.
    # existingSecretName: ""
    # existingSecretKey: "client-secret"

  # -- Secret key for signing self-issued auth tokens (HMAC-SHA256).
  # Required for the basic auth login flow. Set via env var PAPRIKA_AUTH_TOKEN_SECRET
  # using apiServer.extraEnv (avoid putting secrets in values.yaml).
  # tokenSecret: ""

  ## RBAC authorization rules
  ## Subjects may be user names or "group:<group-name>".
  ## Actions: read, write, admin (or * for all).
  ## Resources: applications, pipelines, releases, stages, templates, artifacts (or *).
  ## Namespaces: specific namespace or * for all.
  ##
  rbac: []
  # - subjects: ["admin"]
  #   actions: ["*"]
  #   resources: ["*"]
  #   namespaces: ["*"]
  # - subjects: ["group:readers"]
  #   actions: ["read"]
  #   resources: ["applications"]
  #   namespaces: ["default"]

## GitHub Actions OIDC token exchange for CI cluster access.
## When enabled, the API server exposes /auth/github-actions/token. The endpoint
## verifies GitHub's OIDC token claims before minting a short-lived Kubernetes
## service-account token for kubectl/Helm.
githubActionsTokenExchange:
  enabled: false
  audience: "paprika-vke-deploy"
  repository: ""
  environment: ""
  subject: ""
  tokenTTL: "15m"
  serviceAccount:
    namespace: ""
    name: "github-actions-vke-deployer"

## RBAC configuration
##
rbac:
  ## RBAC resource scope
  ## - false (default): ClusterRole/ClusterRoleBinding (all namespaces)
  ## - true: Role/RoleBinding (release namespace only)
  ##
  namespaced: false

  ## Helper roles for CRD management (admin/editor/viewer)
  ##
  helpers:
    ## Install convenience admin/editor/viewer roles for CRDs
    ##
    enable: false

## ServiceAccount configuration
##
serviceAccount:
  # Install default ServiceAccount provided
  enable: true

  ## Existing ServiceAccount name (only when enable=false)
  ## Note: When enable=true, respects nameOverride/fullnameOverride
  ##
  # name: ""

  ## Custom ServiceAccount annotations
  ##
  # annotations: {}

  ## Custom ServiceAccount labels
  ##
  # labels: {}

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint
##
metrics:
  enable: true
  # Metrics server port
  port: 8443
  # Enable secure metrics: HTTPS with certs/auth (true) or HTTP (false).
  # Note: Metrics authn/authz needs ClusterRole access.
  secure: true
  # Metrics bind address for split-plane deployments.
  # Set to ":8080" to enable on HTTP, or ":0" to disable.
  bindAddress: ":0"
  # Prometheus ServiceMonitor configuration
  serviceMonitor:
    enabled: false
    labels: {}
    # Scrape interval (e.g. "30s")
    interval: ""
    # Scrape timeout (e.g. "10s")
    scrapeTimeout: ""

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

  rules:
    enabled: false

grafana:
  dashboards:
    enabled: false
    ## Labels used by Grafana sidecar to discover dashboards.
    ##
    labelSelectors:
      grafana_dashboard: "1"
    ## Key prefix for ConfigMap data keys (sidecar-specific). Some sidecars
    ## require a specific prefix (e.g. "test-" or "data/") to detect JSON content.
    ##
    # configMapKeyPrefix: ""

## OpenTelemetry configuration
## Ref: https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/
otel:
  enabled: false
  # OTLP endpoint (e.g., "otel-collector.observability.svc:4317" for gRPC, ":4318" for HTTP)
  endpoint: ""
  # Exporter protocol: "grpc" or "http"
  protocol: "grpc"
  # Disable TLS (use plaintext)
  insecure: true
  # Path to CA certificate for TLS verification
  certificatePath: ""
  # Additional headers (e.g., for auth)
  headers: {}
  # Sampler: always_on, always_off, traceidratio, parentbased_traceidratio
  sampler: "always_on"
  # Sampler argument (ratio for traceidratio/parentbased, 0.0-1.0)
  samplerArg: ""
  # Propagators (comma-separated): tracecontext,baggage
  propagators: "tracecontext,baggage"
  # Resource attributes (key-value pairs)
  resourceAttributes: {}

## Redis cache configuration.
## When enabled, components use Redis for rendered manifest and source caching.
##
redis:
  enabled: false
  addr: "redis:6379"
  password: ""
  db: 0

## Audit logging. When enabled, the API server records structured JSON audit
## events for mutating operations to stdout.
audit:
  enabled: true

## Disaster recovery via Velero. When enabled, renders a Velero Schedule that backs up the
## Paprika control-plane state (CRDs in the release namespace) on a cron schedule.
## Velero must already be installed in the cluster (https://velero.io/docs/) with a
## BackupStorageLocation; the Schedule is created in the Velero namespace.
##
velero:
  enabled: false
  ## Namespace where Velero is installed. Schedules must live here for Velero to reconcile them.
  namespace: velero
  ## Name of an existing Velero BackupStorageLocation to send backups to.
  storageLocation: default
  ## Cron schedule for backups. Default: every 6 hours.
  schedule: "0 */6 * * *"
  ## How long Velero retains each backup. Default: 30 days.
  ttl: "720h"
  ## Extra namespaces to include in the backup (e.g. namespaces where your Applications live).
  ## The Paprika release namespace is always included, and cluster-scoped CRDs are backed up
  ## so the custom resource definitions are restored before their instances.
  includeNamespaces: []

## External secrets management.
## Integrates with external-secrets operator (https://external-secrets.io) to
## pull secrets from external providers (AWS Secrets Manager, GCP Secret Manager,
## HashiCorp Vault, Azure Key Vault, etc.) instead of storing them in the cluster.
## Requires the external-secrets operator to be installed.
##
externalSecrets:
  enabled: false

  ## Refresh interval for the ExternalSecret.
  refreshInterval: "1h"

  ## SecretStore to use. Either a ClusterSecretStore name or a namespaced SecretStore.
  ## If storeRef.kind is not set, defaults to ClusterSecretStore.
  storeRef:
    name: ""
    # kind: ClusterSecretStore

  ## Secrets to manage via external-secrets. Each entry creates an ExternalSecret.
  ## The resulting Secret is referenced by the component's existingSecretName fields.
  ##
  secrets:
    ## Webhook secret pulled from external provider.
    ## The resulting secret name is referenced via webhookReceiver.secret.existingSecretName.
    ##
    # - name: paprika-webhook-secret
    #   remoteRef:
    #     key: paprika/prod/webhook-secret
    #     property: secret
    #   targetKey: secret

    ## OIDC client secret pulled from external provider.
    ## The resulting secret name is referenced via auth.oidc.clientSecret.existingSecretName.
    ##
    # - name: paprika-oidc-secret
    #   remoteRef:
    #     key: paprika/prod/oidc-client-secret
    #     property: client-secret

## Helm lifecycle hooks. Hooks run as Jobs before/after install, upgrade, or delete.
##
hooks:
  ## Pre-delete hook that cleans up all CRD instances before uninstall.
  ## Prevents finalizer blocks and orphaned resources when the operator is removed.
  preDeleteCleanup:
    enabled: false
    image:
      repository: docker.io/alpine/k8s
      tag: "1.32.0"
      pullPolicy: IfNotPresent
    # priorityClassName: ""

  crdCheck:
    ## Pre-upgrade hook that validates CRD storage versions and existing resources
    ## before the operator is upgraded. Requires ClusterRole permissions.
    enabled: true
    image:
      repository: docker.io/alpine/k8s
      tag: "1.32.0"
      pullPolicy: IfNotPresent
    ## Priority class for the hook pod (defaults to .priorityClassName)
    # priorityClassName: ""

## Mutual TLS for inter-service communication (split-plane mode).
## When enabled, renders cert-manager Certificates for each component's
## serving TLS + a CA Certificate. Components mount the certs and serve TLS.
## Requires cert-manager to be installed.
mtls:
