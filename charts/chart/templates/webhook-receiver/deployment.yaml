{{- if and (eq .Values.deploymentMode "split") .Values.webhookReceiver.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: webhook-receiver
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  name: {{ include "paprika.resourceName" (dict "suffix" "webhook-receiver" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  replicas: {{ .Values.webhookReceiver.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paprika.name" . }}
      app.kubernetes.io/component: webhook-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "paprika.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: webhook-receiver
        {{- range $k, $v := .Values.commonLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.webhookReceiver.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.webhookReceiver.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.webhookReceiver.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.webhookReceiver.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.webhookReceiver.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.webhookReceiver.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- if .Values.webhookReceiver.podSecurityContext }}
        {{- toYaml .Values.webhookReceiver.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      {{- with .Values.webhookReceiver.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - args:
        {{- if .Values.webhookReceiver.args }}
        {{- range .Values.webhookReceiver.args }}
        - {{ . }}
        {{- end }}
        {{- else }}
        - --mode=webhook
        - --health-probe-bind-address=:8081
        - --webhook-bind-address=:8080
        - --metrics-bind-address={{ .Values.metrics.bindAddress }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.webhookReceiver.image.repository }}{{- if not (contains "@" .Values.webhookReceiver.image.repository) }}:{{ .Values.webhookReceiver.image.tag | default .Chart.AppVersion }}{{- end }}"
        {{- with .Values.webhookReceiver.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        {{- with .Values.webhookReceiver.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: webhook-receiver
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 8080
          name: webhook
          protocol: TCP
        - containerPort: 8082
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.webhookReceiver.resources }}
          {{- toYaml .Values.webhookReceiver.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.webhookReceiver.securityContext }}
          {{- toYaml .Values.webhookReceiver.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        env:
        {{- include "paprika.cacheEnv" . | nindent 8 }}
        {{- if and .Values.repoServer.enabled (eq .Values.deploymentMode "split") }}
        - name: PAPRIKA_REPO_SERVER_ADDR
          value: http://{{ include "paprika.resourceName" (dict "suffix" "repo-server" "context" .) }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.repoServer.service.port }}
        {{- end }}
        {{- if .Values.webhookReceiver.secret.existingSecretName }}
        - name: PAPRIKA_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.webhookReceiver.secret.existingSecretName }}
              key: {{ .Values.webhookReceiver.secret.existingSecretKey }}
        {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: PAPRIKA_MTLS_ENABLED
          value: "true"
        - name: PAPRIKA_TLS_CERT
          value: /etc/paprika/tls/tls.crt
        - name: PAPRIKA_TLS_KEY
          value: /etc/paprika/tls/tls.key
        {{- end }}
        {{- include "paprika.otelEnv" . | nindent 8 }}
        {{- include "paprika.downwardEnv" . | nindent 8 }}
        {{- with .Values.webhookReceiver.extraEnv }}
        {{- include "paprika.extraEnv" . | nindent 8 }}
        {{- end }}
        {{- with .Values.webhookReceiver.extraEnvFrom }}
        envFrom:
        {{- include "paprika.extraEnvFrom" . | nindent 8 }}
        {{- end }}
        volumeMounts:
          {{- toYaml .Values.webhookReceiver.extraVolumeMounts | nindent 10 }}
          {{- if .Values.mtls.enabled }}
          - name: mtls-cert
            mountPath: /etc/paprika/tls
            readOnly: true
          {{- end }}
      securityContext:
        {{- if .Values.webhookReceiver.podSecurityContext }}
        {{- toYaml .Values.webhookReceiver.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "paprika.serviceAccountName" . }}
      {{- $pc := .Values.webhookReceiver.priorityClassName | default .Values.priorityClassName }}
      {{- if $pc }}
      priorityClassName: {{ $pc | quote }}
      {{- end }}
      volumes:
        {{- toYaml .Values.webhookReceiver.extraVolumes | nindent 8 }}
        {{- if .Values.mtls.enabled }}
        - name: mtls-cert
          secret:
            secretName: {{ include "paprika.resourceName" (dict "suffix" "webhook-receiver-mtls" "context" $) }}
        {{- end }}
{{- end }}
