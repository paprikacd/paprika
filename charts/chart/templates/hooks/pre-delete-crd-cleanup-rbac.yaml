{{- if .Values.hooks.preDeleteCleanup.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "paprika.resourceName" (dict "suffix" "pre-delete-crd-cleanup" "context" $) }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pre-delete-cleanup
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
rules:
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list]
  - apiGroups: [pipelines.paprika.io, core.paprika.io, clusters.paprika.io, policy.paprika.io]
    resources: [applications, releases, pipelines, stages, templates, artifacts,
                appprojects, repositories, clusters, policies,
                applicationsets, notificationconfigs, analysisruns, analysistemplates]
    verbs: [get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "paprika.resourceName" (dict "suffix" "pre-delete-crd-cleanup" "context" $) }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pre-delete-cleanup
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "paprika.resourceName" (dict "suffix" "pre-delete-crd-cleanup" "context" $) }}
subjects:
  - kind: ServiceAccount
    name: {{ include "paprika.resourceName" (dict "suffix" "pre-delete-crd-cleanup" "context" $) }}
    namespace: {{ .Release.Namespace }}
{{- end }}
