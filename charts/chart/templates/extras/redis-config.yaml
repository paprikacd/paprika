apiVersion: v1
data:
  redis.conf: |
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    save ""
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/part-of: paprika
  name: {{ include "paprika.resourceName" (dict "suffix" "redis-config" "context" $) }}
  namespace: {{ .Release.Namespace }}
