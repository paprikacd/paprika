{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.secrets }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" $ }}
    helm.sh/chart: {{ $.Chart.Name }}-{{ $.Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    {{- range $k, $v := $.Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.storeRef.name }}
    kind: {{ $.Values.externalSecrets.storeRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .targetKey | default "secret" }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- with .remoteRef.property }}
        property: {{ . }}
        {{- end }}
{{- end }}
{{- end }}
