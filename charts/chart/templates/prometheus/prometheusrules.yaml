{{- if .Values.prometheus.rules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "paprika.resourceName" (dict "suffix" "alerts" "context" $) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
spec:
  groups:
    - name: paprika
      rules:
        - alert: PaprikaComponentDown
          expr: |
            up{job=~".*{{ include "paprika.resourceName" (dict "suffix" "" "context" $) }}.*"} == 0
            or
            absent(up{job=~".*{{ include "paprika.resourceName" (dict "suffix" "" "context" $) }}.*"})
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Paprika component is down
            description: A Paprika component ({{ "{{ $labels.job }}" }}) has been unreachable for 5m.

        - alert: PaprikaReconcileErrors
          expr: rate(controller_runtime_reconcile_errors_total{service="{{ include "paprika.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}"}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika controller reconcile error rate is high
            description: Controller {{ "{{ $labels.controller }}" }} has an elevated error rate.

        - alert: PaprikaReconcileLatencyHigh
          expr: histogram_quantile(0.95, rate(controller_runtime_reconcile_time_seconds_bucket{service="{{ include "paprika.resourceName" (dict "suffix" "controller-manager-metrics-service" "context" $) }}"}[5m])) > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika reconcile latency is high
            description: Controller {{ "{{ $labels.controller }}" }} 95th percentile latency exceeds 30s.

        - alert: PaprikaReleaseFailed
          expr: increase(paprika_release_phase_total{phase="Failed"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Paprika release failed
            description: Release {{ "{{ $labels.release }}" }} in namespace {{ "{{ $labels.namespace }}" }} failed.

        - alert: PaprikaApplicationDegraded
          expr: increase(paprika_application_phase_total{phase="Degraded"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: Paprika application degraded
            description: Application {{ "{{ $labels.application }}" }} in namespace {{ "{{ $labels.namespace }}" }} is degraded.

        - alert: PaprikaClusterUnhealthy
          expr: paprika_cluster_phase{phase="Unhealthy"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika registered cluster is unhealthy
            description: Cluster {{ "{{ $labels.cluster }}" }} in namespace {{ "{{ $labels.namespace }}" }} is unhealthy.

        - alert: PaprikaOOMKilled
          expr: rate(container_memory_failures_total{container=~".*paprika.*", failure_type="oom"}[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: Paprika container OOM killed
            description: Container {{ "{{ $labels.container }}" }} in pod {{ "{{ $labels.pod }}" }} was OOM killed.

        - alert: PaprikaCacheUnreachable
          expr: paprika_cache_errors_total > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika cache error rate is high
            description: Cache errors exceeded 100. Redis may be unreachable.

        - alert: PaprikaWebhookErrors
          expr: rate(paprika_webhook_errors_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika webhook processing errors
            description: Webhook error rate is elevated ({{ "{{ $value | humanizePercentage }}" }}).

        - alert: PaprikaRateLimitExceeded
          expr: rate(paprika_ratelimit_denials_total[5m]) > 10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika rate limit denials
            description: Rate limit denials exceeded 10 req/s.

        - alert: PaprikaApiServerHighRequestLatency
          expr: histogram_quantile(0.95, rate(paprika_api_request_duration_seconds_bucket[5m])) > 5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Paprika API server high request latency
            description: API server 95th percentile request latency exceeds 5s.
{{- end }}
