{{- if .Values.repoServer.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "paprika.resourceName" (dict "suffix" "repo-server" "context" $) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: repo-server
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "paprika.resourceName" (dict "suffix" "repo-server" "context" $) }}
  updatePolicy:
    updateMode: {{ .Values.repoServer.vpa.mode | quote }}
{{- end }}
