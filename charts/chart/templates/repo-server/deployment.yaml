{{- if .Values.repoServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: repo-server
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  name: {{ include "paprika.resourceName" (dict "suffix" "repo-server" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  replicas: {{ .Values.repoServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paprika.name" . }}
      app.kubernetes.io/component: repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "paprika.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: repo-server
        {{- range $k, $v := .Values.commonLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.repoServer.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.repoServer.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.repoServer.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.repoServer.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.repoServer.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.repoServer.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- if .Values.repoServer.podSecurityContext }}
        {{- toYaml .Values.repoServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      {{- with .Values.repoServer.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - args:
        - --metrics-bind-address={{ .Values.metrics.bindAddress }}
        {{- range .Values.repoServer.args }}
        - {{ . }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.repoServer.image.repository }}{{- if not (contains "@" .Values.repoServer.image.repository) }}:{{ .Values.repoServer.image.tag | default .Chart.AppVersion }}{{- end }}"
        {{- with .Values.repoServer.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        {{- with .Values.repoServer.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: repo-server
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 8082
          name: repo
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.repoServer.resources }}
          {{- toYaml .Values.repoServer.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.repoServer.securityContext }}
          {{- toYaml .Values.repoServer.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
          {{- toYaml .Values.repoServer.extraVolumeMounts | nindent 10 }}
          {{- if .Values.mtls.enabled }}
          - name: mtls-cert
            mountPath: /etc/paprika/tls
            readOnly: true
          {{- end }}
        env:
        {{- include "paprika.cacheEnv" . | nindent 8 }}
        {{- if .Values.mtls.enabled }}
        - name: PAPRIKA_MTLS_ENABLED
          value: "true"
        - name: PAPRIKA_TLS_CERT
          value: /etc/paprika/tls/tls.crt
        - name: PAPRIKA_TLS_KEY
          value: /etc/paprika/tls/tls.key
        {{- end }}
        {{- include "paprika.otelEnv" . | nindent 8 }}
        {{- include "paprika.downwardEnv" . | nindent 8 }}
        {{- with .Values.repoServer.extraEnv }}
        {{- include "paprika.extraEnv" . | nindent 8 }}
        {{- end }}
        {{- with .Values.repoServer.extraEnvFrom }}
        envFrom:
        {{- include "paprika.extraEnvFrom" . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- if .Values.repoServer.podSecurityContext }}
        {{- toYaml .Values.repoServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "paprika.serviceAccountName" . }}
      {{- $pc := .Values.repoServer.priorityClassName | default .Values.priorityClassName }}
      {{- if $pc }}
      priorityClassName: {{ $pc | quote }}
      {{- end }}
      volumes:
        {{- toYaml .Values.repoServer.extraVolumes | nindent 8 }}
        {{- if .Values.mtls.enabled }}
        - name: mtls-cert
          secret:
            secretName: {{ include "paprika.resourceName" (dict "suffix" "repo-server-mtls" "context" $) }}
        {{- end }}
{{- end }}
