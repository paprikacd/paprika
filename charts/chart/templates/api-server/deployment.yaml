{{- if eq .Values.deploymentMode "split" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api-server
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  name: {{ include "paprika.resourceName" (dict "suffix" "api-server" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paprika.name" . }}
      app.kubernetes.io/component: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "paprika.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: api-server
        {{- range $k, $v := .Values.commonLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.apiServer.automountServiceAccountToken | default false }}
      {{- with .Values.apiServer.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apiServer.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.apiServer.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.apiServer.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.apiServer.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.apiServer.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      securityContext:
        {{- if .Values.apiServer.podSecurityContext }}
        {{- toYaml .Values.apiServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      {{- with .Values.apiServer.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - args:
        - --mode=api
        - --health-probe-bind-address=:8081
        - --metrics-bind-address={{ .Values.metrics.bindAddress }}
        {{- include "paprika.authArgs" . | nindent 8 }}
        {{- range .Values.apiServer.args }}
        - {{ . }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.apiServer.image.repository }}{{- if not (contains "@" .Values.apiServer.image.repository) }}:{{ .Values.apiServer.image.tag | default .Chart.AppVersion }}{{- end }}"
        {{- with .Values.apiServer.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        {{- with .Values.apiServer.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: api-server
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 3000
          name: api
          protocol: TCP
        - containerPort: 8080
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.apiServer.resources }}
          {{- toYaml .Values.apiServer.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.apiServer.securityContext }}
          {{- toYaml .Values.apiServer.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
          {{- toYaml .Values.apiServer.extraVolumeMounts | nindent 10 }}
          {{- if .Values.mtls.enabled }}
          - name: mtls-cert
            mountPath: /etc/paprika/tls
            readOnly: true
          {{- end }}
        env:
        {{- include "paprika.cacheEnv" . | nindent 8 }}
        {{- include "paprika.auditEnv" . | nindent 8 }}
        {{- include "paprika.githubActionsTokenExchangeEnv" . | nindent 8 }}
        {{- if and .Values.auth.enabled (gt (len .Values.auth.rbac) 0) }}
        - name: PAPRIKA_AUTH_RBAC_RULES
          valueFrom:
            configMapKeyRef:
              name: {{ include "paprika.resourceName" (dict "suffix" "auth-rbac" "context" .) }}
              key: rbac.json
        {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: PAPRIKA_MTLS_ENABLED
          value: "true"
        - name: PAPRIKA_TLS_CERT
          value: /etc/paprika/tls/tls.crt
        - name: PAPRIKA_TLS_KEY
          value: /etc/paprika/tls/tls.key
        {{- end }}
        {{- include "paprika.otelEnv" . | nindent 8 }}
        {{- include "paprika.downwardEnv" . | nindent 8 }}
        {{- with .Values.apiServer.extraEnv }}
        {{- include "paprika.extraEnv" . | nindent 8 }}
        {{- end }}
        {{- with .Values.apiServer.extraEnvFrom }}
        envFrom:
        {{- include "paprika.extraEnvFrom" . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- if .Values.apiServer.podSecurityContext }}
        {{- toYaml .Values.apiServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "paprika.serviceAccountName" . }}
      {{- $pc := .Values.apiServer.priorityClassName | default .Values.priorityClassName }}
      {{- if $pc }}
      priorityClassName: {{ $pc | quote }}
      {{- end }}
      volumes:
        {{- toYaml .Values.apiServer.extraVolumes | nindent 8 }}
        {{- if .Values.mtls.enabled }}
        - name: mtls-cert
          secret:
            secretName: {{ include "paprika.resourceName" (dict "suffix" "api-server-mtls" "context" $) }}
        {{- end }}
{{- end }}
