{{- if eq .Values.deploymentMode "split" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api-server
  name: {{ include "paprika.resourceName" (dict "suffix" "api-server" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.apiServer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paprika.name" . }}
      app.kubernetes.io/component: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "paprika.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/component: api-server
    spec:
      securityContext:
        {{- if .Values.apiServer.podSecurityContext }}
        {{- toYaml .Values.apiServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      containers:
      - args:
        - --mode=api
        - --health-probe-bind-address=:8081
        {{- include "paprika.authArgs" . | nindent 8 }}
        {{- range .Values.apiServer.args }}
        - {{ . }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.apiServer.image.repository }}{{- if not (contains "@" .Values.apiServer.image.repository) }}:{{ .Values.apiServer.image.tag | default .Chart.AppVersion }}{{- end }}"
        {{- with .Values.apiServer.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: api-server
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 3000
          name: api
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.apiServer.resources }}
          {{- toYaml .Values.apiServer.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.apiServer.securityContext }}
          {{- toYaml .Values.apiServer.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
          {{- toYaml .Values.apiServer.extraVolumeMounts | nindent 10 }}
        {{- if or .Values.audit.enabled .Values.redis.enabled (and .Values.auth.enabled (gt (len .Values.auth.rbac) 0)) }}
        env:
        {{- include "paprika.cacheEnv" . | nindent 8 }}
        {{- include "paprika.auditEnv" . | nindent 8 }}
        {{- if and .Values.auth.enabled (gt (len .Values.auth.rbac) 0) }}
        - name: PAPRIKA_AUTH_RBAC_RULES
          valueFrom:
            configMapKeyRef:
              name: {{ include "paprika.resourceName" (dict "suffix" "auth-rbac" "context" .) }}
              key: rbac.json
        {{- end }}
        {{- end }}
      securityContext:
        {{- if .Values.apiServer.podSecurityContext }}
        {{- toYaml .Values.apiServer.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "paprika.serviceAccountName" . }}
      volumes:
        {{- toYaml .Values.apiServer.extraVolumes | nindent 8 }}
{{- end }}
