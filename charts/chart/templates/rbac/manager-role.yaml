apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "paprika.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
{{- if .Values.githubActionsTokenExchange.enabled }}
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  resourceNames:
  - {{ .Values.githubActionsTokenExchange.serviceAccount.name | quote }}
  verbs:
  - create
{{- end }}
