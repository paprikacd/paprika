{{- if and (or (not (hasKey .Values.manager "enabled")) (.Values.manager.enabled)) (not .Values.manager.sharding.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "paprika.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
    {{- with .Values.manager.labels }}
    {{- with omit . "app.kubernetes.io/managed-by" "app.kubernetes.io/name" "helm.sh/chart" "app.kubernetes.io/instance" "control-plane" }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- end }}
    {{- range $k, $v := $.Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  name: {{ include "paprika.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
  {{- if .Values.manager.annotations }}
  annotations:
    {{- toYaml .Values.manager.annotations | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.manager.strategy }}
  strategy: {{ toYaml . | nindent 6 }}
  {{- end }}
  {{- with .Values.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  replicas: {{ .Values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paprika.name" . }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
        {{- with .Values.manager.pod }}
        {{- with .annotations }}
        {{- with omit . "kubectl.kubernetes.io/default-container" }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "paprika.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        control-plane: controller-manager
        {{- with .Values.manager.pod }}
        {{- with .labels }}
        {{- with omit . "app.kubernetes.io/name" "helm.sh/chart" "app.kubernetes.io/instance" "app.kubernetes.io/managed-by" "control-plane" }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- range $k, $v := $.Values.commonLabels }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.manager.automountServiceAccountToken | default false }}
      {{- with .Values.manager.topologySpreadConstraints }}
      topologySpreadConstraints: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- $pc := .Values.manager.priorityClassName | default .Values.priorityClassName }}
      {{- if $pc }}
      priorityClassName: {{ $pc | quote }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with .Values.manager.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - args:
        {{- if .Values.metrics.enable }}
        - --metrics-bind-address=:{{ .Values.metrics.port }}
        {{- if not .Values.metrics.secure }}
        - --metrics-secure=false
        {{- end }}
        {{- else }}
        # Bind to :0 to disable the controller-runtime managed metrics server
        - --metrics-bind-address=0
        {{- end }}
        - --leader-elect
        - --health-probe-bind-address=:8081
        {{- if eq .Values.deploymentMode "split" }}
        - --mode=operator
        {{- else }}
        - --mode={{ .Values.mode }}
        {{- end }}
        {{- if and (eq .Values.mode "api") (ne .Values.remoteCluster.apiServer "") }}
        - --k8s-api-server={{ .Values.remoteCluster.apiServer }}
        {{- end }}
        {{- if and (eq .Values.mode "api") (ne .Values.remoteCluster.tokenFile "") }}
        - --k8s-token-file={{ .Values.remoteCluster.tokenFile }}
        {{- end }}
        {{- if eq .Values.deploymentMode "monolith" }}
        {{- include "paprika.authArgs" . | nindent 8 }}
        {{- end }}
        {{- range .Values.manager.args }}
        - {{ . }}
        {{- end }}
        command:
        - /manager
        image: "{{ .Values.manager.image.repository }}{{- if not (contains "@" .Values.manager.image.repository) }}:{{ .Values.manager.image.tag | default .Chart.AppVersion }}{{- end }}"
        {{- with .Values.manager.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        {{- with .Values.manager.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        {{- if .Values.webhook.enabled }}
        - containerPort: 9443
          name: admission
          protocol: TCP
        {{- end }}
        {{- if eq .Values.deploymentMode "monolith" }}
        - containerPort: 3000
          name: ui
          protocol: TCP
        - containerPort: 8080
          name: webhook
          protocol: TCP
        {{- end }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if .Values.manager.resources }}
          {{- toYaml .Values.manager.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if .Values.manager.securityContext }}
          {{- toYaml .Values.manager.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
          {{- toYaml .Values.manager.extraVolumeMounts | nindent 10 }}
          {{- if .Values.certManager.enable }}
          - name: webhook-cert
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true
          {{- end }}
          {{- if .Values.mtls.enabled }}
          - name: mtls-cert
            mountPath: /etc/paprika/tls
            readOnly: true
          {{- end }}
        env:
        {{- include "paprika.cacheEnv" . | nindent 8 }}
        {{- include "paprika.auditEnv" . | nindent 8 }}
        {{- include "paprika.githubActionsTokenExchangeEnv" . | nindent 8 }}
        {{- if not .Values.webhook.enabled }}
        - name: ENABLE_WEBHOOKS
          value: "false"
        {{- end }}
        {{- if .Values.repoServer.enabled }}
        - name: PAPRIKA_REPO_SERVER_ADDR
          value: http://{{ include "paprika.resourceName" (dict "suffix" "repo-server" "context" .) }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.repoServer.service.port }}
        {{- if .Values.repoServer.clientTimeout }}
        - name: PAPRIKA_REPO_SERVER_TIMEOUT
          value: {{ .Values.repoServer.clientTimeout | quote }}
        {{- end }}
        {{- end }}
        {{- if and (eq .Values.deploymentMode "monolith") .Values.auth.enabled (gt (len .Values.auth.rbac) 0) }}
        - name: PAPRIKA_AUTH_RBAC_RULES
          valueFrom:
            configMapKeyRef:
              name: {{ include "paprika.resourceName" (dict "suffix" "auth-rbac" "context" .) }}
              key: rbac.json
        {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: PAPRIKA_MTLS_ENABLED
          value: "true"
        - name: PAPRIKA_TLS_CERT
          value: /etc/paprika/tls/tls.crt
        - name: PAPRIKA_TLS_KEY
          value: /etc/paprika/tls/tls.key
        {{- end }}
        {{- include "paprika.otelEnv" . | nindent 8 }}
        {{- include "paprika.downwardEnv" . | nindent 8 }}
        {{- with .Values.manager.extraEnv }}
        {{- include "paprika.extraEnv" . | nindent 8 }}
        {{- end }}
        {{- with .Values.manager.extraEnvFrom }}
        envFrom:
        {{- include "paprika.extraEnvFrom" . | nindent 8 }}
        {{- end }}
      securityContext:
        {{- if .Values.manager.podSecurityContext }}
        {{- toYaml .Values.manager.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "paprika.serviceAccountName" . }}
      {{- if and (hasKey .Values.manager "terminationGracePeriodSeconds") (ne .Values.manager.terminationGracePeriodSeconds nil) }}
      terminationGracePeriodSeconds: {{ .Values.manager.terminationGracePeriodSeconds }}
      {{- end }}
      volumes:
        {{- toYaml .Values.manager.extraVolumes | nindent 8 }}
        {{- if .Values.certManager.enable }}
        - name: webhook-cert
          secret:
            secretName: webhook-server-cert
        {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: mtls-cert
          secret:
            secretName: {{ include "paprika.resourceName" (dict "suffix" "controller-manager-mtls" "context" $) }}
        {{- end }}
{{- end }}
