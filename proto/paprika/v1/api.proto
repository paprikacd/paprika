syntax = "proto3";

package paprika.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/benebsworth/paprika/internal/api/paprika/v1";

message Step {
  string name = 1;
  string image = 2;
  string script = 3;
  repeated string depends = 4;
}

message StepStatus {
  string name = 1;
  string phase = 2;
  // Seconds since Unix epoch.
  optional int64 started_at = 3;
  // Seconds since Unix epoch.
  optional int64 completed_at = 4;
}

message ArtifactRef {
  string name = 1;
  string path = 2;
  string kind = 3;
  string reference = 4;
  string resolved_reference = 5;
  string digest = 6;
  string phase = 7;
  string producing_step = 8;
  int64 created_at = 9;
  string failed_reason = 10;
}

message ChartRef {
  string repo = 1;
  string name = 2;
  string version = 3;
  string path = 4;
}

message InlineSource {
  string config_map_ref = 1;
}

message OCISource {
  string url = 1;
  string tag = 2;
  bool insecure = 3;
  string secret_ref = 4;
}

message ApplicationSource {
  string type = 1;
  string repo_url = 2;
  string revision = 3;
  string path = 4;
  ChartRef chart = 5;
  // S3 source fields
  string bucket = 6;
  string key = 7;
  string region = 8;
  string endpoint = 9;
  // Shared fields
  string secret_ref = 10;
  string poll_interval = 11;
  InlineSource inline = 12;
  // OCI registry source
  OCISource oci = 13;
}

message ApplicationStage {
  string name = 1;
  int32 ring = 2;
  string phase = 3;
  string release = 4;
  string revision = 5;
}

message HTTPProbe {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  string body = 4;
  int32 expected_status = 5;
  int32 timeout = 6;
}

message HealthCheck {
  string name = 1;
  string expression = 2;
  HTTPProbe http_probe = 3;
  string interval = 4;
}

message HealthCheckResult {
  string name = 1;
  string status = 2;
  string message = 3;
  // Seconds since Unix epoch.
  optional int64 checked_at = 4;
  int32 http_status_code = 5;
  string http_body = 6;
}

message ResourceSync {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string status = 4;
}

message ResourceHealth {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string health = 4;
  string message = 5;
}

message GateStatus {
  string name = 1;
  string stage = 2;
  string status = 3;
  string approved_by = 4;
  string type = 5;
  string message = 6;
}

message Condition {
  string type = 1;
  string status = 2;     // "True", "False", "Unknown"
  int64 observed_generation = 3;
  string last_transition_time = 4; // RFC3339
  string reason = 5;
  string message = 6;
}

message AnalysisResult {
  string name = 1;
  string phase = 2;
  bool passed = 3;
  string message = 4;
  string checked_at = 5; // RFC3339
}

message AnalysisRunResult {
  string name = 1;
  bool passed = 2;
  string message = 3;
  string detail = 4;
  string checked_at = 5; // RFC3339
}

message AnalysisRun {
  string name = 1;
  string namespace = 2;
  string template_ref = 3;
  string application_ref = 4;
  string phase = 5;
  int32 cycles_executed = 6;
  int64 started_at = 7;
  int64 completed_at = 8;
  int64 observed_generation = 9;
  map<string, string> args = 10;
  repeated AnalysisRunResult results = 11;
  repeated Condition conditions = 12;
}

message Application {
  string name = 1;
  string namespace = 2;
  string phase = 3;
  string current_stage = 4;
  string revision = 5;
  bool synced = 6;
  string template_ref = 7;
  string pipeline_ref = 8;
  string release_ref = 9;
  repeated ApplicationStage stages = 10;
  ApplicationSource source = 11;
  string strategy = 12;
  string sync_policy = 13;
  map<string, string> parameters = 14;
  // Source change detection
  string source_hash = 15;
  string source_revision = 16;
  // Health check results
  string health = 17;
  repeated HealthCheckResult health_checks = 18;
  // Resource sync status
  repeated ResourceSync resources = 19;
  repeated ResourceHealth resource_health = 20;
  int32 out_of_sync = 21;
  int32 pruned_resources = 22;
  // Approval gates
  repeated GateStatus gates = 23;
  string project = 24;
  repeated Condition conditions = 25;
  repeated AnalysisResult analysis_results = 26;
}

message Pipeline {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  repeated Step steps = 4;
  int32 max_parallel = 5;
  string phase = 6;
  repeated StepStatus step_statuses = 7;
  repeated ArtifactRef artifacts = 8;
}

message ManifestSource {
  string config_map_ref = 1;
}

message PolicyResult {
  string name = 1;
  string severity = 2;
  string action = 3;
  bool passed = 4;
  string message = 5;
}

message Release {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  string pipeline = 4;
  string target = 5;
  string phase = 6;
  string current_stage = 7;
  repeated Promotion promotion_history = 8;
  ManifestSource manifest_source = 9;
  repeated PolicyResult policy_results = 10;
  string application = 11;
  string rolled_back_to = 12;
  int64 observed_generation = 13;
  repeated Condition conditions = 14;
  string rendered_manifest_snapshot = 15;
  int32 canary_weight = 16;
  int32 canary_step_index = 17;
  int64 canary_step_started_at = 18;
  string rollout_ref = 19;
  repeated HookStatus hook_statuses = 20;
}

message Promotion {
  string stage = 1;
  string result = 2;
  // Seconds since Unix epoch.
  int64 timestamp = 3;
  string manifest_snapshot = 4;
}

message HookStatus {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string phase = 4;
  string status = 5;
  int64 started_at = 6;
  int64 completed_at = 7;
  string message = 8;
}

message Stage {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  int32 ring = 4;
  string phase = 5;
  string stage_name = 6;
}

message TrafficRouter {
  string provider = 1;
  IstioRouterConfig istio = 2;
  GatewayAPIRouterConfig gateway_api = 3;
}

message IstioRouterConfig {
  string virtual_service = 1;
  repeated string routes = 2;
  repeated string hosts = 3;
  string stable_service = 4;
  string canary_service = 5;
}

message GatewayAPIRouterConfig {
  string http_route = 1;
  string stable_service = 2;
  string canary_service = 3;
}

message RolloutStep {
  int32 set_weight = 1;
  string duration = 2;
}

message RolloutAnalysisCheck {
  string type = 1;
  string url = 2;
  map<string, string> http_headers = 3;
  string success_threshold = 4;
  int32 timeout_seconds = 5;
  int32 request_count = 6;
  string metric = 7;
  string threshold = 8;
  int32 window_seconds = 9;
}

message RolloutABRoute {
  string type = 1;
  string name = 2;
  string value = 3;
  string service = 4;
}

message ListPipelinesRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListPipelinesResponse {
  repeated Pipeline pipelines = 1;
}

message ListReleasesRequest {
  optional string namespace = 1;
  string project = 2;
  string application_name = 3;
  int32 page_size = 4;
  int32 page_offset = 5;
}

message ListReleasesResponse {
  repeated Release releases = 1;
  int32 total_count = 2;
}

message ListStagesRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListStagesResponse {
  repeated Stage stages = 1;
}

message ListApplicationsRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
}

message ListPoliciesRequest {
  optional string namespace = 1;
}

message ListPoliciesResponse {
  repeated Policy policies = 1;
}

message Policy {
  string name = 1;
  string severity = 2;
  string default_action = 3;
  string description = 4;
}

message GetApplicationRequest {
  string name = 1;
  string namespace = 2;
}

message GetApplicationResponse {
  Application application = 1;
}

message ApplicationSet {
  string name = 1;
  string namespace = 2;
  int32 applications = 3;
  string phase = 4;
}

message ListApplicationSetsRequest {
  optional string namespace = 1;
}

message ListApplicationSetsResponse {
  repeated ApplicationSet applicationsets = 1;
}

message GetApplicationSetRequest {
  string name = 1;
  string namespace = 2;
}

message GetApplicationSetResponse {
  ApplicationSet applicationset = 1;
}

message SyncApplicationRequest {
  string name = 1;
  string namespace = 2;
}

message SyncApplicationResponse {
  Application application = 1;
}

message NotificationTrigger {
  string resource_type = 1;
  string phase = 2;
  string reason = 3;
}

message NotificationDestination {
  string name = 1;
  string webhook_url = 2;
  string slack_webhook_url = 3;
  string email = 4;
  string secret_ref = 5;
  map<string, string> headers = 6;
}

message SMTPConfig {
  string host = 1;
  int32 port = 2;
  string from = 3;
  bool tls_enabled = 4;
  string auth_secret_ref = 5;
}

message NotificationRateLimit {
  string min_interval = 1;
}

message NotificationConfig {
  string name = 1;
  string namespace = 2;
  repeated NotificationTrigger triggers = 3;
  repeated NotificationDestination destinations = 4;
  string template = 5;
  SMTPConfig smtp = 6;
  NotificationRateLimit rate_limit = 7;
}

message ListNotificationConfigsRequest {
  optional string namespace = 1;
}

message ListNotificationConfigsResponse {
  repeated NotificationConfig notification_configs = 1;
}

message ApproveGateRequest {
  string name = 1;
  string namespace = 2;
  string gate = 3;
}

message ApproveGateResponse {
  Application application = 1;
}

message ListGateStatusRequest {
  string namespace = 1;
  string name = 2;
}

message ListGateStatusResponse {
  repeated GateStatus gates = 1;
}

message RejectGateRequest {
  string name = 1;
  string namespace = 2;
  string gate = 3;
}

message RejectGateResponse {
  Application application = 1;
}

message ResolveSourceRequest {
  string namespace = 1;
  string name = 2;
  string type = 3;
  bytes spec_json = 4;
}

message ResolveSourceResponse {
  string local_path = 1;
  string hash = 2;
  string revision = 3;
}

message RenderRequest {
  string namespace = 1;
  string name = 2;
  string type = 3;
  bytes spec_json = 4;
  bytes values_json = 5;
}

message RenderResponse {
  bytes manifests = 1;
}

message ApplyBundleRequest {
  string namespace = 1;
  string name = 2;
  bytes manifests = 3;
  repeated string skip_policies = 4;
  map<string, string> policy_overrides = 5;
  bool dry_run = 6;
  string project = 7;
}

message ApplyBundleResponse {
  Application application = 1;
  Release release = 2;
  repeated PolicyResult policy_results = 3;
  bool blocked = 4;
  string block_reason = 5;
}

message RollbackReleaseRequest {
  string namespace = 1;
  string name = 2;
}

message RollbackReleaseResponse {
  Release release = 1;
}

message Rollout {
  string name = 1;
  string namespace = 2;
  string strategy_type = 3;
  string phase = 4;
  int32 current_step = 5;
  int32 current_weight = 6;
  string stable_rs = 7;
  string canary_rs = 8;
  string active_service = 9;
  string preview_service = 10;
  int64 observed_generation = 11;
  repeated Condition conditions = 12;
  string message = 13;
  string target_kind = 14;
  string target_name = 15;
  int32 replicas = 16;
  bool paused = 17;
  bool abort = 18;
  int32 stable_ready_replicas = 19;
  int32 canary_ready_replicas = 20;
  int64 current_step_started_at = 21;
  int64 promoted_at = 22;
  int64 preview_healthy_at = 23;
  string current_pod_hash = 24;
  string previous_active_rs = 25;
  TrafficRouter traffic_router = 26;
  repeated RolloutStep canary_steps = 27;
  repeated RolloutAnalysisCheck analysis_checks = 28;
  repeated RolloutABRoute ab_routes = 29;
  int32 mirror_percent = 30;
  int32 auto_promotion_seconds = 31;
  int32 scale_down_delay_seconds = 32;
}

message ListRolloutsRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListRolloutsResponse {
  repeated Rollout rollouts = 1;
}

message GetRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message GetRolloutResponse {
  Rollout rollout = 1;
}

message PromoteRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message PromoteRolloutResponse {
  Rollout rollout = 1;
}

message AbortRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message AbortRolloutResponse {
  Rollout rollout = 1;
}

message ListAnalysisRunsRequest {
  optional string namespace = 1;
  string application_name = 2;
  string project = 3;
}
message ListAnalysisRunsResponse {
  repeated AnalysisRun analysis_runs = 1;
}

message GetAnalysisRunRequest {
  string namespace = 1;
  string name = 2;
}
message GetAnalysisRunResponse {
  AnalysisRun analysis_run = 1;
}

message GetPipelineRequest {
  string name = 1;
  string namespace = 2;
}
message GetPipelineResponse { Pipeline pipeline = 1; }

message GetArtifactRequest {
  string namespace = 1;
  string name = 2;
}
message GetArtifactResponse {
  ArtifactRef artifact = 1;
  string download_url = 2;
}

message ListArtifactsRequest {
  string namespace = 1;
  optional string pipeline_name = 2;
}
message ListArtifactsResponse {
  repeated ArtifactRef artifacts = 1;
}

message RetryStepRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
}
message RetryStepResponse {}

message SkipStepRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
}
message SkipStepResponse {}

message CancelPipelineRequest {
  string name = 1;
  string namespace = 2;
}
message CancelPipelineResponse {}

message GetStepLogsRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
  int32 tail_lines = 4;
}
message GetStepLogsResponse { string logs = 1; }

message GetResourceRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
}

message KubernetesEvent {
  string type = 1;
  string reason = 2;
  string message = 3;
  string last_timestamp = 4;
  int32 count = 5;
  string involved_object_kind = 6;
  string involved_object_name = 7;
}

message GetResourceResponse {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health_status = 5;
  string health_message = 6;
  string live_manifest = 7;
  string desired_manifest = 8;
  string diff = 9;
  repeated KubernetesEvent events = 10;
  string api_version = 11;
  string group = 12;
  string version = 13;
  string resource = 14;
  string uid = 15;
  map<string, string> labels = 16;
  map<string, string> annotations = 17;
}

message GetResourceTreeRequest {
  string namespace = 1;
  string name = 2;
}

message ResourceNode {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health = 5;
  string health_message = 6;
  string parent_kind = 7;
  string parent_name = 8;
  string uid = 9;
  bool managed = 10;
}

message GetResourceTreeResponse {
  repeated ResourceNode nodes = 1;
}

message GetResourceLogsRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
  int32 tail_lines = 6;
}
message GetResourceLogsResponse {
  string pod_name = 1;
  string container_name = 2;
  repeated string containers = 3;
  string logs = 4;
  string error = 5;
}

message GetResourceTreeDetailedRequest {
  string application_namespace = 1;
  string application_name = 2;
}
message ResourceTreeNode {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health = 5;
  string health_message = 6;
  string parent_kind = 7;
  string parent_name = 8;
  string uid = 9;
  bool managed = 10;
  string phase = 11;
  int32 ready = 12;
  int32 total = 13;
  string message = 14;
  repeated string containers = 15;
}
message GetResourceTreeDetailedResponse {
  repeated ResourceTreeNode nodes = 1;
}

// buf:lint:ignore ENUM_VALUE_PREFIX
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  CRITICAL = 1;
  WARNING = 2;
  INFO = 3;
}

message InvestigateRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
}
message FindingEvidence {
  string source = 1;
  string timestamp = 2;
  string summary = 3;
}
message InvestigationFinding {
  string id = 1;
  Severity severity = 2;
  string title = 3;
  string description = 4;
  repeated FindingEvidence evidence = 5;
  repeated string playbook = 6;
  string narrator = 7;
}
message InvestigateResponse {
  repeated InvestigationFinding findings = 1;
  string summary = 2;
  string narrator = 3;
  uint64 generated_at_ms = 4;
}
message ListInvestigatorPluginsRequest {}
message PluginInfo {
  string name = 1;
  string type = 2;
}
message ListInvestigatorPluginsResponse {
  repeated PluginInfo plugins = 1;
}

message StreamResourceLogsRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
  string container_name = 6;
  bool follow = 7;
}
message LogChunk {
  string pod_name = 1;
  string container_name = 2;
  string line = 3;
  int64 timestamp_ms = 4;
}

enum FleetHealth {
  FLEET_HEALTH_UNSPECIFIED = 0;
  FLEET_HEALTH_HEALTHY = 1;
  FLEET_HEALTH_PROGRESSING = 2;
  FLEET_HEALTH_DEGRADED = 3;
  FLEET_HEALTH_FAILED = 4;
  FLEET_HEALTH_UNKNOWN = 5;
  FLEET_HEALTH_MISSING = 6;
}

enum FleetSyncState {
  FLEET_SYNC_STATE_UNSPECIFIED = 0;
  FLEET_SYNC_STATE_SYNCED = 1;
  FLEET_SYNC_STATE_OUT_OF_SYNC = 2;
  FLEET_SYNC_STATE_UNKNOWN = 3;
}

enum FleetSourceType {
  FLEET_SOURCE_TYPE_UNSPECIFIED = 0;
  FLEET_SOURCE_TYPE_GIT = 1;
  FLEET_SOURCE_TYPE_HELM = 2;
  FLEET_SOURCE_TYPE_KUSTOMIZE = 3;
  FLEET_SOURCE_TYPE_S3 = 4;
  FLEET_SOURCE_TYPE_OCI = 5;
  FLEET_SOURCE_TYPE_INLINE = 6;
}

enum FleetReleaseState {
  FLEET_RELEASE_STATE_UNSPECIFIED = 0;
  FLEET_RELEASE_STATE_PENDING = 1;
  FLEET_RELEASE_STATE_PROMOTING = 2;
  FLEET_RELEASE_STATE_CANARYING = 3;
  FLEET_RELEASE_STATE_VERIFYING = 4;
  FLEET_RELEASE_STATE_COMPLETE = 5;
  FLEET_RELEASE_STATE_FAILED = 6;
  FLEET_RELEASE_STATE_ROLLED_BACK = 7;
  FLEET_RELEASE_STATE_SUPERSEDED = 8;
  FLEET_RELEASE_STATE_AWAITING_APPROVAL = 9;
}

enum FleetRolloutState {
  FLEET_ROLLOUT_STATE_UNSPECIFIED = 0;
  FLEET_ROLLOUT_STATE_PENDING = 1;
  FLEET_ROLLOUT_STATE_PROGRESSING = 2;
  FLEET_ROLLOUT_STATE_PAUSED = 3;
  FLEET_ROLLOUT_STATE_HEALTHY = 4;
  FLEET_ROLLOUT_STATE_DEGRADED = 5;
  FLEET_ROLLOUT_STATE_FAILED = 6;
  FLEET_ROLLOUT_STATE_ROLLED_BACK = 7;
  FLEET_ROLLOUT_STATE_ABORTED = 8;
}

enum FleetSortField {
  FLEET_SORT_FIELD_UNSPECIFIED = 0;
  FLEET_SORT_FIELD_NAME = 1;
  FLEET_SORT_FIELD_PROJECT = 2;
  FLEET_SORT_FIELD_CLUSTER = 3;
  FLEET_SORT_FIELD_STAGE = 4;
  FLEET_SORT_FIELD_HEALTH = 5;
  FLEET_SORT_FIELD_SYNC = 6;
  FLEET_SORT_FIELD_RELEASE = 7;
  FLEET_SORT_FIELD_ROLLOUT = 8;
  FLEET_SORT_FIELD_RESOURCE_COUNT = 9;
  FLEET_SORT_FIELD_LAST_TRANSITION = 10;
  FLEET_SORT_FIELD_IMPACT = 11;
  FLEET_SORT_FIELD_RELEVANCE = 12;
}

enum FleetSortDirection {
  FLEET_SORT_DIRECTION_UNSPECIFIED = 0;
  FLEET_SORT_DIRECTION_ASC = 1;
  FLEET_SORT_DIRECTION_DESC = 2;
}

enum FleetGroupDimension {
  FLEET_GROUP_DIMENSION_UNSPECIFIED = 0;
  FLEET_GROUP_DIMENSION_PROJECT = 1;
  FLEET_GROUP_DIMENSION_CLUSTER = 2;
  FLEET_GROUP_DIMENSION_STAGE = 3;
  FLEET_GROUP_DIMENSION_HEALTH = 4;
  FLEET_GROUP_DIMENSION_NAMESPACE = 5;
}

enum FleetSizeMetric {
  FLEET_SIZE_METRIC_UNSPECIFIED = 0;
  FLEET_SIZE_METRIC_RESOURCE_COUNT = 1;
  FLEET_SIZE_METRIC_REQUEST_RATE = 2;
}

enum FleetFacetDimension {
  FLEET_FACET_DIMENSION_UNSPECIFIED = 0;
  FLEET_FACET_DIMENSION_PROJECT = 1;
  FLEET_FACET_DIMENSION_NAMESPACE = 2;
  FLEET_FACET_DIMENSION_CLUSTER = 3;
  FLEET_FACET_DIMENSION_STAGE = 4;
  FLEET_FACET_DIMENSION_HEALTH = 5;
  FLEET_FACET_DIMENSION_SYNC = 6;
  FLEET_FACET_DIMENSION_RELEASE = 7;
  FLEET_FACET_DIMENSION_ROLLOUT = 8;
  FLEET_FACET_DIMENSION_SOURCE_TYPE = 9;
}

enum FleetCapability {
  FLEET_CAPABILITY_UNSPECIFIED = 0;
  FLEET_CAPABILITY_APPLICATION_SYNC = 1;
  FLEET_CAPABILITY_RELEASE_ROLLBACK = 2;
  FLEET_CAPABILITY_GATE_APPROVE = 3;
  FLEET_CAPABILITY_PIPELINE_RETRY = 4;
}

enum FleetConnectionState {
  FLEET_CONNECTION_STATE_UNSPECIFIED = 0;
  FLEET_CONNECTION_STATE_HEALTHY = 1;
  FLEET_CONNECTION_STATE_UNHEALTHY = 2;
  FLEET_CONNECTION_STATE_DISABLED = 3;
  FLEET_CONNECTION_STATE_NOT_CONFIGURED = 4;
}

enum FleetMapNodeKind {
  FLEET_MAP_NODE_KIND_UNSPECIFIED = 0;
  FLEET_MAP_NODE_KIND_GROUP = 1;
  FLEET_MAP_NODE_KIND_APPLICATION = 2;
}

message FleetObjectKey {
  string namespace = 1;
  string name = 2;
}

message FleetFilter {
  repeated FleetObjectKey projects = 1;
  repeated string namespaces = 2;
  repeated FleetObjectKey clusters = 3;
  repeated string stages = 4;
  repeated FleetHealth health = 5;
  repeated FleetSyncState sync = 6;
  repeated FleetReleaseState release_states = 7;
  repeated FleetRolloutState rollout_states = 8;
  repeated FleetSourceType source_types = 9;
}

message StageTargetSummary {
  string stable_id = 1;
  string stage = 2;
  int32 ring = 3;
  FleetObjectKey cluster = 4;
  string cluster_label = 5;
  FleetHealth health = 6;
  FleetConnectionState cluster_connection = 7;
  bool unmanaged_inline_cluster = 8;
}

message ApplicationSummary {
  FleetObjectKey identity = 1;
  FleetObjectKey project = 2;
  repeated StageTargetSummary targets = 3;
  string current_stage = 4;
  FleetObjectKey current_cluster = 5;
  string current_cluster_label = 6;
  FleetSourceType source_type = 7;
  string source_revision = 8;
  FleetHealth health = 9;
  FleetSyncState sync = 10;
  uint32 drift_count = 11;
  uint32 missing_resource_count = 12;
  FleetReleaseState release_state = 13;
  FleetRolloutState rollout_state = 14;
  uint32 resource_count = 15;
  FleetObjectKey repository = 16;
  FleetConnectionState repository_connection = 17;
  FleetObjectKey effective_observability_source = 18;
  FleetConnectionState observability_connection = 19;
  uint32 blocked_gate_count = 20;
  int64 last_transition_unix_ms = 21;
  repeated FleetCapability capabilities = 22;
}

message FleetFacetBucket {
  FleetFacetDimension dimension = 1;
  oneof key {
    FleetObjectKey object = 2;
    string value = 3;
  }
  string label = 4;
  uint64 count = 5;
}

message FleetHealthBucket {
  FleetHealth health = 1;
  uint64 count = 2;
}

message FleetMapApplicationMetadata {
  FleetObjectKey project = 1;
  FleetObjectKey current_cluster = 2;
  string current_stage = 3;
  FleetSyncState sync = 4;
  FleetReleaseState release = 5;
  FleetRolloutState rollout = 6;
  uint64 drifted_resources = 7;
  uint64 missing_resources = 8;
  uint64 managed_resources = 9;
  google.protobuf.Timestamp last_transition = 10;
  string issue_summary = 11;
}

message QueryApplicationsRequest {
  FleetFilter filter = 1;
  string search = 2;
  FleetSortField sort = 3;
  FleetSortDirection direction = 4;
  uint32 page_size = 5;
  string cursor = 6;
}

message QueryApplicationsResponse {
  repeated ApplicationSummary applications = 1;
  uint64 total = 2;
  string next_cursor = 3;
  uint64 index_generation = 4;
  repeated FleetFacetBucket facets = 5;
}

message FleetMapNode {
  string stable_id = 1;
  FleetMapNodeKind kind = 2;
  string label = 3;
  FleetObjectKey application = 4;
  oneof group_key {
    FleetObjectKey group_object = 5;
    string group_value = 6;
  }
  uint64 application_count = 7;
  uint64 target_count = 8;
  repeated FleetHealthBucket health = 9;
  uint64 resource_weight = 10;
  double request_rate_weight = 11;
  double effective_weight = 12;
  bool used_resource_fallback = 13;
  repeated FleetMapNode children = 14;
  FleetMapApplicationMetadata application_metadata = 15;
}

message QueryFleetMapRequest {
  FleetFilter filter = 1;
  string search = 2;
  FleetGroupDimension group = 3;
  FleetSizeMetric size_metric = 4;
}

message QueryFleetMapResponse {
  repeated FleetMapNode roots = 1;
  uint64 total = 2;
  uint64 index_generation = 3;
  repeated FleetFacetBucket facets = 4;
}

message FleetMatrixHeader {
  string stable_id = 1;
  string label = 2;
  oneof key {
    FleetObjectKey object = 3;
    string value = 4;
  }
}

message FleetMatrixCell {
  string row_id = 1;
  string column_id = 2;
  uint64 application_count = 3;
  uint64 target_count = 4;
  repeated FleetHealthBucket health = 5;
  uint64 resource_weight = 6;
  double request_rate_weight = 7;
  bool used_resource_fallback = 8;
}

message QueryFleetMatrixRequest {
  FleetFilter filter = 1;
  string search = 2;
  FleetGroupDimension row_group = 3;
  FleetGroupDimension column_group = 4;
  FleetSizeMetric size_metric = 5;
}

message QueryFleetMatrixResponse {
  repeated FleetMatrixHeader rows = 1;
  repeated FleetMatrixHeader columns = 2;
  repeated FleetMatrixCell cells = 3;
  uint64 total = 4;
  uint64 index_generation = 5;
  repeated FleetFacetBucket facets = 6;
}

message QueryReleasesRequest {
  FleetFilter filter = 1;
  string search = 2;
  uint32 page_size = 3;
  uint32 page_offset = 4;
}

message QueryReleasesResponse {
  repeated Release releases = 1;
  uint64 total_count = 2;
}

service PaprikaService {
  rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
  rpc ListReleases(ListReleasesRequest) returns (ListReleasesResponse);
  rpc ListStages(ListStagesRequest) returns (ListStagesResponse);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc ListApplicationSets(ListApplicationSetsRequest) returns (ListApplicationSetsResponse);
  rpc GetApplicationSet(GetApplicationSetRequest) returns (GetApplicationSetResponse);
  rpc ListNotificationConfigs(ListNotificationConfigsRequest) returns (ListNotificationConfigsResponse);
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse);
  rpc SyncApplication(SyncApplicationRequest) returns (SyncApplicationResponse);
  rpc ApproveGate(ApproveGateRequest) returns (ApproveGateResponse);
  rpc ListGateStatus(ListGateStatusRequest) returns (ListGateStatusResponse);
  rpc RejectGate(RejectGateRequest) returns (RejectGateResponse);
  rpc ResolveSource(ResolveSourceRequest) returns (ResolveSourceResponse);
  rpc Render(RenderRequest) returns (RenderResponse);
  rpc ApplyBundle(ApplyBundleRequest) returns (ApplyBundleResponse);
  rpc RollbackRelease(RollbackReleaseRequest) returns (RollbackReleaseResponse);
  rpc ListRollouts(ListRolloutsRequest) returns (ListRolloutsResponse);
  rpc GetRollout(GetRolloutRequest) returns (GetRolloutResponse);
  rpc PromoteRollout(PromoteRolloutRequest) returns (PromoteRolloutResponse);
  rpc AbortRollout(AbortRolloutRequest) returns (AbortRolloutResponse);
  rpc ListAnalysisRuns(ListAnalysisRunsRequest) returns (ListAnalysisRunsResponse);
  rpc GetAnalysisRun(GetAnalysisRunRequest) returns (GetAnalysisRunResponse);
  rpc GetPipeline(GetPipelineRequest) returns (GetPipelineResponse);
  rpc GetArtifact(GetArtifactRequest) returns (GetArtifactResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);
  rpc RetryStep(RetryStepRequest) returns (RetryStepResponse);
  rpc SkipStep(SkipStepRequest) returns (SkipStepResponse);
  rpc CancelPipeline(CancelPipelineRequest) returns (CancelPipelineResponse);
  rpc GetStepLogs(GetStepLogsRequest) returns (GetStepLogsResponse);
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc GetResourceTree(GetResourceTreeRequest) returns (GetResourceTreeResponse);
  rpc GetResourceLogs(GetResourceLogsRequest) returns (GetResourceLogsResponse);
  rpc GetResourceTreeDetailed(GetResourceTreeDetailedRequest) returns (GetResourceTreeDetailedResponse);
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  rpc StreamResourceLogs(StreamResourceLogsRequest) returns (stream LogChunk);
  rpc Investigate(InvestigateRequest) returns (InvestigateResponse);
  rpc ListInvestigatorPlugins(ListInvestigatorPluginsRequest) returns (ListInvestigatorPluginsResponse);
  rpc QueryApplications(QueryApplicationsRequest) returns (QueryApplicationsResponse);
  rpc QueryFleetMap(QueryFleetMapRequest) returns (QueryFleetMapResponse);
  rpc QueryFleetMatrix(QueryFleetMatrixRequest) returns (QueryFleetMatrixResponse);
  rpc QueryReleases(QueryReleasesRequest) returns (QueryReleasesResponse);
}
