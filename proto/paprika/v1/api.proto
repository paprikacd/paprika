syntax = "proto3";

package paprika.v1;

option go_package = "github.com/benebsworth/paprika/internal/api/paprika/v1";

message Step {
  string name = 1;
  string image = 2;
  string script = 3;
  repeated string depends = 4;
}

message StepStatus {
  string name = 1;
  string phase = 2;
  // Seconds since Unix epoch.
  optional int64 started_at = 3;
  // Seconds since Unix epoch.
  optional int64 completed_at = 4;
}

message ArtifactRef {
  string name = 1;
  string path = 2;
  string kind = 3;
  string reference = 4;
  string resolved_reference = 5;
  string digest = 6;
  string phase = 7;
  string producing_step = 8;
  int64 created_at = 9;
  string failed_reason = 10;
}

message ChartRef {
  string repo = 1;
  string name = 2;
  string version = 3;
  string path = 4;
}

message InlineSource {
  string config_map_ref = 1;
}

message OCISource {
  string url = 1;
  string tag = 2;
  bool insecure = 3;
  string secret_ref = 4;
}

message ApplicationSource {
  string type = 1;
  string repo_url = 2;
  string revision = 3;
  string path = 4;
  ChartRef chart = 5;
  // S3 source fields
  string bucket = 6;
  string key = 7;
  string region = 8;
  string endpoint = 9;
  // Shared fields
  string secret_ref = 10;
  string poll_interval = 11;
  InlineSource inline = 12;
  // OCI registry source
  OCISource oci = 13;
}

message ApplicationStage {
  string name = 1;
  int32 ring = 2;
  string phase = 3;
  string release = 4;
  string revision = 5;
}

message HTTPProbe {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  string body = 4;
  int32 expected_status = 5;
  int32 timeout = 6;
}

message HealthCheck {
  string name = 1;
  string expression = 2;
  HTTPProbe http_probe = 3;
  string interval = 4;
}

message HealthCheckResult {
  string name = 1;
  string status = 2;
  string message = 3;
  // Seconds since Unix epoch.
  optional int64 checked_at = 4;
  int32 http_status_code = 5;
  string http_body = 6;
}

message ResourceSync {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string status = 4;
}

message ResourceHealth {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string health = 4;
  string message = 5;
}

message GateStatus {
  string name = 1;
  string stage = 2;
  string status = 3;
  string approved_by = 4;
  string type = 5;
  string message = 6;
}

message Condition {
  string type = 1;
  string status = 2;     // "True", "False", "Unknown"
  int64 observed_generation = 3;
  string last_transition_time = 4; // RFC3339
  string reason = 5;
  string message = 6;
}

message AnalysisResult {
  string name = 1;
  string phase = 2;
  bool passed = 3;
  string message = 4;
  string checked_at = 5; // RFC3339
}

message Application {
  string name = 1;
  string namespace = 2;
  string phase = 3;
  string current_stage = 4;
  string revision = 5;
  bool synced = 6;
  string template_ref = 7;
  string pipeline_ref = 8;
  string release_ref = 9;
  repeated ApplicationStage stages = 10;
  ApplicationSource source = 11;
  string strategy = 12;
  string sync_policy = 13;
  map<string, string> parameters = 14;
  // Source change detection
  string source_hash = 15;
  string source_revision = 16;
  // Health check results
  string health = 17;
  repeated HealthCheckResult health_checks = 18;
  // Resource sync status
  repeated ResourceSync resources = 19;
  repeated ResourceHealth resource_health = 20;
  int32 out_of_sync = 21;
  int32 pruned_resources = 22;
  // Approval gates
  repeated GateStatus gates = 23;
  string project = 24;
  repeated Condition conditions = 25;
  repeated AnalysisResult analysis_results = 26;
}

message Pipeline {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  repeated Step steps = 4;
  int32 max_parallel = 5;
  string phase = 6;
  repeated StepStatus step_statuses = 7;
  repeated ArtifactRef artifacts = 8;
}

message ManifestSource {
  string config_map_ref = 1;
}

message PolicyResult {
  string name = 1;
  string severity = 2;
  string action = 3;
  bool passed = 4;
  string message = 5;
}

message Release {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  string pipeline = 4;
  string target = 5;
  string phase = 6;
  string current_stage = 7;
  repeated Promotion promotion_history = 8;
  ManifestSource manifest_source = 9;
  repeated PolicyResult policy_results = 10;
  string application = 11;
  string rolled_back_to = 12;
}

message Promotion {
  string stage = 1;
  string result = 2;
  // Seconds since Unix epoch.
  int64 timestamp = 3;
}

message Stage {
  string name = 1;
  string namespace = 2;
  // Seconds since Unix epoch.
  int64 created_at = 3;
  int32 ring = 4;
  string phase = 5;
  string stage_name = 6;
}

message TrafficRouter {
  string provider = 1;
  IstioRouterConfig istio = 2;
  GatewayAPIRouterConfig gateway_api = 3;
}

message IstioRouterConfig {
  string virtual_service = 1;
  repeated string routes = 2;
  repeated string hosts = 3;
  string stable_service = 4;
  string canary_service = 5;
}

message GatewayAPIRouterConfig {
  string http_route = 1;
  string stable_service = 2;
  string canary_service = 3;
}

message ListPipelinesRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListPipelinesResponse {
  repeated Pipeline pipelines = 1;
}

message ListReleasesRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListReleasesResponse {
  repeated Release releases = 1;
}

message ListStagesRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListStagesResponse {
  repeated Stage stages = 1;
}

message ListApplicationsRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListApplicationsResponse {
  repeated Application applications = 1;
}

message ListPoliciesRequest {
  optional string namespace = 1;
}

message ListPoliciesResponse {
  repeated Policy policies = 1;
}

message Policy {
  string name = 1;
  string severity = 2;
  string default_action = 3;
  string description = 4;
}

message GetApplicationRequest {
  string name = 1;
  string namespace = 2;
}

message GetApplicationResponse {
  Application application = 1;
}

message ApplicationSet {
  string name = 1;
  string namespace = 2;
  int32 applications = 3;
  string phase = 4;
}

message ListApplicationSetsRequest {
  optional string namespace = 1;
}

message ListApplicationSetsResponse {
  repeated ApplicationSet applicationsets = 1;
}

message GetApplicationSetRequest {
  string name = 1;
  string namespace = 2;
}

message GetApplicationSetResponse {
  ApplicationSet applicationset = 1;
}

message SyncApplicationRequest {
  string name = 1;
  string namespace = 2;
}

message SyncApplicationResponse {
  Application application = 1;
}

message NotificationTrigger {
  string resource_type = 1;
  string phase = 2;
  string reason = 3;
}

message NotificationDestination {
  string name = 1;
  string webhook_url = 2;
  string slack_webhook_url = 3;
  string email = 4;
  string secret_ref = 5;
  map<string, string> headers = 6;
}

message SMTPConfig {
  string host = 1;
  int32 port = 2;
  string from = 3;
  bool tls_enabled = 4;
  string auth_secret_ref = 5;
}

message NotificationRateLimit {
  string min_interval = 1;
}

message NotificationConfig {
  string name = 1;
  string namespace = 2;
  repeated NotificationTrigger triggers = 3;
  repeated NotificationDestination destinations = 4;
  string template = 5;
  SMTPConfig smtp = 6;
  NotificationRateLimit rate_limit = 7;
}

message ListNotificationConfigsRequest {
  optional string namespace = 1;
}

message ListNotificationConfigsResponse {
  repeated NotificationConfig notification_configs = 1;
}

message ApproveGateRequest {
  string name = 1;
  string namespace = 2;
  string gate = 3;
}

message ApproveGateResponse {
  Application application = 1;
}

message ListGateStatusRequest {
  string namespace = 1;
  string name = 2;
}

message ListGateStatusResponse {
  repeated GateStatus gates = 1;
}

message RejectGateRequest {
  string name = 1;
  string namespace = 2;
  string gate = 3;
}

message RejectGateResponse {
  Application application = 1;
}

message ResolveSourceRequest {
  string namespace = 1;
  string name = 2;
  string type = 3;
  bytes spec_json = 4;
}

message ResolveSourceResponse {
  string local_path = 1;
  string hash = 2;
  string revision = 3;
}

message RenderRequest {
  string namespace = 1;
  string name = 2;
  string type = 3;
  bytes spec_json = 4;
  bytes values_json = 5;
}

message RenderResponse {
  bytes manifests = 1;
}

message ApplyBundleRequest {
  string namespace = 1;
  string name = 2;
  bytes manifests = 3;
  repeated string skip_policies = 4;
  map<string, string> policy_overrides = 5;
  bool dry_run = 6;
  string project = 7;
}

message ApplyBundleResponse {
  Application application = 1;
  Release release = 2;
  repeated PolicyResult policy_results = 3;
  bool blocked = 4;
  string block_reason = 5;
}

message RollbackReleaseRequest {
  string namespace = 1;
  string name = 2;
}

message RollbackReleaseResponse {
  Release release = 1;
}

message Rollout {
  string name = 1;
  string namespace = 2;
  string strategy_type = 3;
  string phase = 4;
  int32 current_step = 5;
  int32 current_weight = 6;
  string stable_rs = 7;
  string canary_rs = 8;
  string active_service = 9;
  string preview_service = 10;
  int64 observed_generation = 11;
  repeated Condition conditions = 12;
  string message = 13;
  string target_kind = 14;
  string target_name = 15;
}

message ListRolloutsRequest {
  optional string namespace = 1;
  string project = 2;
}

message ListRolloutsResponse {
  repeated Rollout rollouts = 1;
}

message GetRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message GetRolloutResponse {
  Rollout rollout = 1;
}

message PromoteRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message PromoteRolloutResponse {
  Rollout rollout = 1;
}

message AbortRolloutRequest {
  string namespace = 1;
  string name = 2;
}

message AbortRolloutResponse {
  Rollout rollout = 1;
}

message GetPipelineRequest {
  string name = 1;
  string namespace = 2;
}
message GetPipelineResponse { Pipeline pipeline = 1; }

message GetArtifactRequest {
  string namespace = 1;
  string name = 2;
}
message GetArtifactResponse {
  ArtifactRef artifact = 1;
  string download_url = 2;
}

message ListArtifactsRequest {
  string namespace = 1;
  optional string pipeline_name = 2;
}
message ListArtifactsResponse {
  repeated ArtifactRef artifacts = 1;
}

message RetryStepRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
}
message RetryStepResponse {}

message SkipStepRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
}
message SkipStepResponse {}

message CancelPipelineRequest {
  string name = 1;
  string namespace = 2;
}
message CancelPipelineResponse {}

message GetStepLogsRequest {
  string pipeline_name = 1;
  string pipeline_namespace = 2;
  string step_name = 3;
  int32 tail_lines = 4;
}
message GetStepLogsResponse { string logs = 1; }

message GetResourceRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
}

message KubernetesEvent {
  string type = 1;
  string reason = 2;
  string message = 3;
  string last_timestamp = 4;
  int32 count = 5;
  string involved_object_kind = 6;
  string involved_object_name = 7;
}

message GetResourceResponse {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health_status = 5;
  string health_message = 6;
  string live_manifest = 7;
  string desired_manifest = 8;
  string diff = 9;
  repeated KubernetesEvent events = 10;
}

message GetResourceTreeRequest {
  string namespace = 1;
  string name = 2;
}

message ResourceNode {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health = 5;
  string health_message = 6;
  string parent_kind = 7;
  string parent_name = 8;
  string uid = 9;
  bool managed = 10;
}

message GetResourceTreeResponse {
  repeated ResourceNode nodes = 1;
}

message GetResourceLogsRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
  int32 tail_lines = 6;
}
message GetResourceLogsResponse {
  string pod_name = 1;
  string container_name = 2;
  repeated string containers = 3;
  string logs = 4;
  string error = 5;
}

message GetResourceTreeDetailedRequest {
  string application_namespace = 1;
  string application_name = 2;
}
message ResourceTreeNode {
  string kind = 1;
  string name = 2;
  string namespace = 3;
  string sync_status = 4;
  string health = 5;
  string health_message = 6;
  string parent_kind = 7;
  string parent_name = 8;
  string uid = 9;
  bool managed = 10;
  string phase = 11;
  int32 ready = 12;
  int32 total = 13;
  string message = 14;
  repeated string containers = 15;
}
message GetResourceTreeDetailedResponse {
  repeated ResourceTreeNode nodes = 1;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  CRITICAL = 1;
  WARNING = 2;
  INFO = 3;
}

message InvestigateRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
}
message FindingEvidence {
  string source = 1;
  string timestamp = 2;
  string summary = 3;
}
message InvestigationFinding {
  string id = 1;
  Severity severity = 2;
  string title = 3;
  string description = 4;
  repeated FindingEvidence evidence = 5;
  repeated string playbook = 6;
  string narrator = 7;
}
message InvestigateResponse {
  repeated InvestigationFinding findings = 1;
  string summary = 2;
  string narrator = 3;
  uint64 generated_at_ms = 4;
}
message ListInvestigatorPluginsRequest {}
message PluginInfo {
  string name = 1;
  string type = 2;
}
message ListInvestigatorPluginsResponse {
  repeated PluginInfo plugins = 1;
}

message StreamResourceLogsRequest {
  string application_namespace = 1;
  string application_name = 2;
  string resource_kind = 3;
  string resource_name = 4;
  string resource_namespace = 5;
  string container_name = 6;
  bool follow = 7;
}
message LogChunk {
  string pod_name = 1;
  string container_name = 2;
  string line = 3;
  int64 timestamp_ms = 4;
}

service PaprikaService {
  rpc ListPipelines(ListPipelinesRequest) returns (ListPipelinesResponse);
  rpc ListReleases(ListReleasesRequest) returns (ListReleasesResponse);
  rpc ListStages(ListStagesRequest) returns (ListStagesResponse);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc ListApplicationSets(ListApplicationSetsRequest) returns (ListApplicationSetsResponse);
  rpc GetApplicationSet(GetApplicationSetRequest) returns (GetApplicationSetResponse);
  rpc ListNotificationConfigs(ListNotificationConfigsRequest) returns (ListNotificationConfigsResponse);
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse);
  rpc SyncApplication(SyncApplicationRequest) returns (SyncApplicationResponse);
  rpc ApproveGate(ApproveGateRequest) returns (ApproveGateResponse);
  rpc ListGateStatus(ListGateStatusRequest) returns (ListGateStatusResponse);
  rpc RejectGate(RejectGateRequest) returns (RejectGateResponse);
  rpc ResolveSource(ResolveSourceRequest) returns (ResolveSourceResponse);
  rpc Render(RenderRequest) returns (RenderResponse);
  rpc ApplyBundle(ApplyBundleRequest) returns (ApplyBundleResponse);
  rpc RollbackRelease(RollbackReleaseRequest) returns (RollbackReleaseResponse);
  rpc ListRollouts(ListRolloutsRequest) returns (ListRolloutsResponse);
  rpc GetRollout(GetRolloutRequest) returns (GetRolloutResponse);
  rpc PromoteRollout(PromoteRolloutRequest) returns (PromoteRolloutResponse);
  rpc AbortRollout(AbortRolloutRequest) returns (AbortRolloutResponse);
  rpc GetPipeline(GetPipelineRequest) returns (GetPipelineResponse);
  rpc GetArtifact(GetArtifactRequest) returns (GetArtifactResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);
  rpc RetryStep(RetryStepRequest) returns (RetryStepResponse);
  rpc SkipStep(SkipStepRequest) returns (SkipStepResponse);
  rpc CancelPipeline(CancelPipelineRequest) returns (CancelPipelineResponse);
  rpc GetStepLogs(GetStepLogsRequest) returns (GetStepLogsResponse);
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc GetResourceTree(GetResourceTreeRequest) returns (GetResourceTreeResponse);
  rpc GetResourceLogs(GetResourceLogsRequest) returns (GetResourceLogsResponse);
  rpc GetResourceTreeDetailed(GetResourceTreeDetailedRequest) returns (GetResourceTreeDetailedResponse);
  rpc StreamResourceLogs(StreamResourceLogsRequest) returns (stream LogChunk);
  rpc Investigate(InvestigateRequest) returns (InvestigateResponse);
  rpc ListInvestigatorPlugins(ListInvestigatorPluginsRequest) returns (ListInvestigatorPluginsResponse);
}