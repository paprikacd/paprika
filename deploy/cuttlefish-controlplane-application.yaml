apiVersion: pipelines.paprika.io/v1alpha1
kind: Application
metadata:
  name: cuttlefish-controlplane
  namespace: paprika-e2e
  labels:
    app.kubernetes.io/name: cuttlefish-controlplane
    app.kubernetes.io/part-of: cuttlefish
spec:
  project: default
  source:
    type: git
    repoUrl: https://github.com/paprikacd/cuttlefish-controlplane-chart.git
    revision: main
    path: "."
    pollInterval: 60s
  parameters:
    image.repository: us-central1-docker.pkg.dev/cuttlefish-d16cd/cuttlefish/controlplane
    image.tag: d79947400714-vke-20260709055002
    imagePullSecrets[0].name: cuttlefish-gar
    secretEnv.existingSecret: cuttlefish-controlplane-env
    secretEnv.optional: "false"
    gcpCredentials.existingSecret: cuttlefish-controlplane-gcp-service-account
    gcpCredentials.key: google-application-credentials.json
    gateway.parentRefs[0].name: paprika
    gateway.parentRefs[0].namespace: envoy-gateway-system
    gateway.hostnames[0]: origin-vke.cuttlefish.sh
    gateway.hostnames[1]: api.cuttlefish.sh
  stages:
    - name: vke-staging
      ring: 1
      autoPromote: false
      canary:
        steps: [10, 50, 100]
        intervalSeconds: 60
      parameters:
        replicaCount: "1"
        gateway.enabled: "true"
  strategy: Canary
  syncPolicy: Auto
  healthChecks:
    - name: controlplane-live
      interval: 30s
      httpProbe:
        url: http://cuttlefish-controlplane-release.paprika-e2e.svc.cluster.local:4444/healthz
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.ok == true
    - name: controlplane-ready
      interval: 30s
      httpProbe:
        url: http://cuttlefish-controlplane-release.paprika-e2e.svc.cluster.local:4444/readyz
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.ok == true && http.bodyJson.deps.storage.ok == true
  onFailure:
    action: rollback
  selfHeal:
    autoSyncOnDrift: false
    autoRevertOnHealthFailure: true
    cooldown: 5m
