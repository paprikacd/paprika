replicaCount: 2

imagePullSecrets:
  - name: telesis-gar

secretEnv:
  existingSecret: telesis-api-env
  optional: false

workloadIdentity:
  enabled: true
  projectNumber: "1070169189903"
  pool: vke-omega
  provider: omega
  serviceAccountEmail: telesis-vke-runtime@uptime-485903.iam.gserviceaccount.com

env:
  nonSecret:
    PORT: "9500"
    SERVICE_NAME: telesis-api
    GO_ENV: production
    ENV: production
    GCP_PROJECT_ID: uptime-485903
    PUBSUB_TOPIC_ID: check-jobs
    PUBSUB_JOB_TOPIC_ID: check-jobs
    RUNNER_REGION: syd1
    RATE_LIMIT_REQUESTS_PER_MINUTE: "300"
    RATE_LIMIT_BURST_SIZE: "60"
    RATE_LIMIT_ENABLED: "true"
    QUICK_CHECK_CACHE_TTL_SECONDS: "30"
    API_BASE_URL: https://api.telesis.dev
    FRONTEND_URL: https://telesis.dev
    FRONTEND_BASE_URL: https://telesis.dev
    RESEND_FROM_NAME: Telesis Alerts

gateway:
  enabled: true
  parentRefs:
    - name: paprika
      namespace: envoy-gateway-system
  hostnames:
    - origin-vke.telesis.dev

autoscaling:
  enabled: false

pdb:
  enabled: false

components:
  scheduler:
    enabled: true
    secretEnv:
      existingSecret: telesis-api-env
    env:
      nonSecret:
        GCP_PROJECT_ID: uptime-485903
        PUBSUB_TOPIC_ID: check-jobs
  runner:
    enabled: true
    secretEnv:
      existingSecret: telesis-api-env
    env:
      nonSecret:
        GCP_PROJECT_ID: uptime-485903
        PUBSUB_SUBSCRIPTION_ID: check-jobs-sub
        PUBSUB_RESULT_TOPIC_ID: check-results
        PUBSUB_MODE: pull
  resultprocessor:
    enabled: true
    secretEnv:
      existingSecret: telesis-api-env
    env:
      nonSecret:
        GCP_PROJECT_ID: uptime-485903
        PUBSUB_RESULT_SUBSCRIPTION_ID: check-results-sub
        PUBSUB_MODE: pull
        FRONTEND_BASE_URL: https://telesis.dev
  rollup:
    enabled: true
    secretEnv:
      existingSecret: telesis-api-env
    env:
      nonSecret:
        RETENTION_DAYS: "7"
        CLEANUP_BATCH_SIZE: "5000"
