apiVersion: pipelines.paprika.io/v1alpha1
kind: Application
metadata:
  name: brandbrain-api
  namespace: paprika-e2e
  labels:
    app.kubernetes.io/name: brandbrain-api
    app.kubernetes.io/part-of: brandbrain
spec:
  project: default
  source:
    type: git
    repoUrl: https://github.com/paprikacd/brandbrain-api-chart.git
    revision: main
    path: "."
    pollInterval: 60s
  parameters:
    imagePullSecrets[0].name: brandbrain-gar
    secretEnv.existingSecret: brandbrain-api-env
    secretEnv.optional: "false"
    workloadIdentity.enabled: "true"
    workloadIdentity.projectNumber: "976998755879"
    workloadIdentity.pool: vke-omega
    workloadIdentity.provider: omega
    workloadIdentity.serviceAccountEmail: brandbrain-backend@brandbrain-486909.iam.gserviceaccount.com
    gateway.parentRefs[0].name: paprika
    gateway.parentRefs[0].namespace: envoy-gateway-system
    gateway.hostnames[0]: origin-vke.brandbrain.dev
    gateway.hostnames[1]: api.brandbrain.dev
  stages:
    - name: vke-staging
      ring: 1
      autoPromote: false
      canary:
        steps: [10, 50, 100]
        intervalSeconds: 60
      parameters:
        replicaCount: "1"
        gateway.enabled: "true"
  strategy: Canary
  syncPolicy: Auto
  healthChecks:
    - name: api-live
      interval: 30s
      httpProbe:
        url: http://brandbrain-api-release.paprika-e2e.svc.cluster.local:4445/health
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.status == "healthy"
    - name: api-version-dependencies
      interval: 60s
      httpProbe:
        url: http://brandbrain-api-release.paprika-e2e.svc.cluster.local:4445/version
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.status == "healthy" && http.bodyJson.checks.postgres.status == "ok" && http.bodyJson.checks.gcs.status == "ok"
    - name: api-search-smoke
      interval: 120s
      httpProbe:
        url: http://brandbrain-api-release.paprika-e2e.svc.cluster.local:4445/brandbrain.v1.BrandService/SearchBrands
        method: POST
        headers:
          Content-Type: application/json
        body: '{"query":"test","limit":1,"offset":0}'
        timeout: 5
      expression: http.statusCode == 200 && http.body.contains("{")
  onFailure:
    action: rollback
  selfHeal:
    autoSyncOnDrift: false
    autoRevertOnHealthFailure: true
    cooldown: 5m
