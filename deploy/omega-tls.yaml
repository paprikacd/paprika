# Self-signed issuer for origin TLS (Cloudflare Full mode)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: paprika-selfsigned
spec:
  selfSigned: {}
---
# Certificate for origin encryption (Cloudflare → Envoy)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paprika-tls
  namespace: paprika-e2e
spec:
  secretName: paprika-tls
  dnsNames:
    - paprika.benebsworth.com
  issuerRef:
    name: paprika-selfsigned
    kind: ClusterIssuer
