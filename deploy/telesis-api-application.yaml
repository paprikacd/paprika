apiVersion: pipelines.paprika.io/v1alpha1
kind: Application
metadata:
  name: telesis-api
  namespace: paprika-e2e
  labels:
    app.kubernetes.io/name: telesis-api
    app.kubernetes.io/part-of: telesis
spec:
  project: default
  source:
    type: git
    repoUrl: https://github.com/paprikacd/telesis-api-chart.git
    revision: main
    path: "."
    pollInterval: 60s
  parameters:
    imagePullSecrets[0].name: telesis-gar
    secretEnv.existingSecret: telesis-api-env
    secretEnv.optional: "false"
    workloadIdentity.enabled: "true"
    workloadIdentity.projectNumber: "1070169189903"
    workloadIdentity.pool: vke-omega
    workloadIdentity.provider: omega
    workloadIdentity.serviceAccountEmail: telesis-vke-runtime@uptime-485903.iam.gserviceaccount.com
    env.nonSecret.GCP_PROJECT_ID: uptime-485903
    env.nonSecret.PUBSUB_TOPIC_ID: check-jobs
    env.nonSecret.PUBSUB_JOB_TOPIC_ID: check-jobs
    probes.readinessPath: /health
    components.scheduler.enabled: "true"
    components.scheduler.secretEnv.existingSecret: telesis-api-env
    components.scheduler.env.nonSecret.GCP_PROJECT_ID: uptime-485903
    components.scheduler.env.nonSecret.PUBSUB_TOPIC_ID: check-jobs
    components.runner.enabled: "true"
    components.runner.secretEnv.existingSecret: telesis-api-env
    components.runner.env.nonSecret.GCP_PROJECT_ID: uptime-485903
    components.runner.env.nonSecret.PUBSUB_SUBSCRIPTION_ID: check-jobs-sub
    components.runner.env.nonSecret.PUBSUB_RESULT_TOPIC_ID: check-results
    components.runner.env.nonSecret.PUBSUB_MODE: pull
    components.resultprocessor.enabled: "true"
    components.resultprocessor.secretEnv.existingSecret: telesis-api-env
    components.resultprocessor.env.nonSecret.GCP_PROJECT_ID: uptime-485903
    components.resultprocessor.env.nonSecret.PUBSUB_RESULT_SUBSCRIPTION_ID: check-results-sub
    components.resultprocessor.env.nonSecret.PUBSUB_MODE: pull
    components.resultprocessor.env.nonSecret.FRONTEND_BASE_URL: https://telesis.dev
    components.rollup.enabled: "true"
    components.rollup.secretEnv.existingSecret: telesis-api-env
    components.rollup.env.nonSecret.RETENTION_DAYS: "7"
    components.rollup.env.nonSecret.CLEANUP_BATCH_SIZE: "5000"
    gateway.parentRefs[0].name: paprika
    gateway.parentRefs[0].namespace: envoy-gateway-system
    gateway.hostnames[0]: origin-vke.telesis.dev
  stages:
    - name: vke-staging
      ring: 1
      autoPromote: false
      canary:
        steps: [10, 50, 100]
        intervalSeconds: 60
      parameters:
        replicaCount: "2"
        gateway.enabled: "true"
  strategy: Canary
  syncPolicy: Auto
  healthChecks:
    - name: api-ready
      interval: 30s
      httpProbe:
        url: http://telesis-api-release.paprika-e2e.svc.cluster.local:9500/health
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.components.database.status == "healthy"
    - name: api-detailed-health
      interval: 60s
      httpProbe:
        url: http://telesis-api-release.paprika-e2e.svc.cluster.local:9500/health
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.components.database.status == "healthy" && http.bodyJson.components.queries.response_time_ms < 1000
    - name: scheduler-live
      interval: 30s
      httpProbe:
        url: http://telesis-api-release-scheduler.paprika-e2e.svc.cluster.local:8081/health
        method: GET
        timeout: 5
      expression: http.statusCode == 200
    - name: runner-live
      interval: 30s
      httpProbe:
        url: http://telesis-api-release-runner.paprika-e2e.svc.cluster.local:8082/health/live
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.status == "healthy"
    - name: resultprocessor-live
      interval: 30s
      httpProbe:
        url: http://telesis-api-release-resultprocessor.paprika-e2e.svc.cluster.local:8083/health/live
        method: GET
        timeout: 5
      expression: http.statusCode == 200 && http.bodyJson.status == "healthy"
    - name: rollup-live
      interval: 30s
      httpProbe:
        url: http://telesis-api-release-rollup.paprika-e2e.svc.cluster.local:9505/health
        method: GET
        timeout: 5
      expression: http.statusCode == 200
  onFailure:
    action: rollback
  selfHeal:
    autoSyncOnDrift: false
    autoRevertOnHealthFailure: true
    cooldown: 5m
