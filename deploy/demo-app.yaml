apiVersion: pipelines.paprika.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: paprika-e2e
  labels:
    app.kubernetes.io/name: demo-app
spec:
  source:
    type: git
    repoUrl: https://github.com/paprikacd/paprika.git
    revision: master
    path: charts/demo-app
    pollInterval: 60s
  stages:
    - name: dev
      ring: 1
      autoPromote: true
      parameters:
        replicaCount: "1"
        features.ingress.enabled: "false"
  strategy: Rolling
  syncPolicy: Auto
  onFailure:
    action: rollback
