version: v2
plugins:
  - local: protoc-gen-go
    out: internal/api
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: internal/api
    opt:
      - paths=source_relative
  - local: ui/node_modules/.bin/protoc-gen-es
    out: ui/src/gen
    opt:
      - target=js+dts
  - local: ui/node_modules/.bin/protoc-gen-connect-es
    out: ui/src/gen
    opt:
      - target=js+dts
