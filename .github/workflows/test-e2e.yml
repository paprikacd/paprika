name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'api/**'
      - 'config/**'
      - 'charts/**'
      - 'test/e2e/**'
      - 'Makefile'
      - 'Dockerfile'
      - 'demo/**'
      - '.github/workflows/test-e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - '**.go'
      - 'api/**'
      - 'config/**'
      - 'charts/**'
      - 'test/e2e/**'
      - 'Makefile'
      - 'Dockerfile'
      - 'demo/**'
      - '.github/workflows/test-e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-e2e:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
      E2E_SKIP_IMAGE_BUILD: "true"
      E2E_SKIP_IMAGE_LOAD: "true"
      KIND_CLUSTER: paprika-test-e2e
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build manager image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: example.com/paprika:v0.0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build demo image
        uses: docker/build-push-action@v5
        with:
          context: ./demo
          file: ./demo/Dockerfile
          push: false
          load: true
          tags: localhost/paprika-demo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: make setup-test-e2e

      - name: Load images into kind
        run: |
          kind load docker-image example.com/paprika:v0.0.1 --name ${{ env.KIND_CLUSTER }}
          kind load docker-image localhost/paprika-demo:latest --name ${{ env.KIND_CLUSTER }}

      - name: Run e2e tests
        run: go test -tags=e2e ./test/e2e/ -v -ginkgo.v -timeout=30m

      - name: Cleanup kind cluster
        if: always()
        run: make cleanup-test-e2e
