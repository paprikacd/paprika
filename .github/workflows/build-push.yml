name: Build & Push

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/paprikacd/paprika:latest
            ghcr.io/paprikacd/paprika:sha-${{ github.sha }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 10
          # Try org-scoped first, then repo-scoped, then user-scoped
          for endpoint in \
            "/orgs/paprikacd/packages/container/paprika" \
            "/repos/paprikacd/paprika/packages/container/paprika"; do
            echo "Trying: $endpoint"
            response=$(gh api -X PATCH "$endpoint" -f visibility=public 2>&1) && {
              echo "SUCCESS: $response"
              exit 0
            } || {
              echo "FAILED: $response"
            }
          done
          echo "All endpoints failed"
