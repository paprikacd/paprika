name: Publish Helm Chart

on:
  push:
    paths:
      - "charts/chart/**"
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to publish (e.g., 0.1.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: "latest"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(grep '^version:' charts/chart/Chart.yaml | awk '{print $2}')" >> $GITHUB_OUTPUT
          fi

      - name: Package chart
        run: |
          helm package charts/chart \
            --destination .dist/ \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}

      - name: Push to OCI registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin
          helm push .dist/paprika-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/paprikacd/charts
