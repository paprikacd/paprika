name: Deploy GKE Dev

on:
  workflow_run:
    workflows: [Build & Push]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency: deploy-gke-dev

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Deploy operator to GKE dev
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: auto
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ vars.GKE_CLUSTER_NAME }} \
            --zone ${{ vars.GKE_CLUSTER_ZONE }} \
            --project ${{ vars.GKE_CLUSTER_PROJECT }}

      - name: Install CRDs
        run: make install

      - name: Deploy via Helm
        run: |
          helm upgrade --install paprika-dev ./charts/chart \
            --set image.repository=ghcr.io/paprikacd/paprika \
            --set image.tag=sha-${{ github.sha }} \
            --set mode=operator \
            --wait \
            --timeout 5m
