name: Test Chart

on:
  push:
  pull_request:

permissions: {}

jobs:
  test-chart:
    permissions:
      contents: read
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    env:
      IMG: controller:latest
      GOTOOLCHAIN: auto
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install kind v0.32.0
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-$(go env GOARCH)"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Create kind cluster
        run: kind create cluster

      - name: Prepare paprika
        run: |
          go mod tidy
          make docker-build
          kind load docker-image "$IMG"

      - name: Install Helm
        run: make install-helm

      - name: Lint Helm Chart
        run: |
          helm lint ./charts/chart

      - name: Verify split-plane metrics wiring
        run: bash hack/test-split-metrics.sh

      - name: Verify admin dashboard Helm isolation
        run: bash hack/test-admin-dashboard-helm.sh

# TODO: Uncomment if cert-manager is enabled
